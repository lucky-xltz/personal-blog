<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>异动计算器 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1f1a16;
            --bg-light: #252019;
            --bg-raised: #2a231c;
            --bg-card: #2a231c;
            --shadow-dark: rgba(0, 0, 0, 0.55);
            --shadow-light: rgba(255, 255, 255, 0.04);
            --accent: #e67e22;
            --accent-soft: rgba(230, 126, 34, 0.15);
            --text: #e0e5ec;
            --text-dim: #a0a8b8;
            --text-muted: #7a8494;
            --border: rgba(255, 255, 255, 0.06);
            --up: #f85149;
            --down: #2ea043;
            --warn: #d29922;
            --danger: #f85149;
            --safe: #2ea043;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --neu-raised: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
            --neu-raised-sm: 3px 3px 8px var(--shadow-dark), -3px -3px 8px var(--shadow-light);
            --neu-inset: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
            --neu-inset-sm: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-text-size-adjust: 100%;
        }
        body {
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        /* Nav */
        .nav {
            background: rgba(31, 26, 22, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color var(--transition);
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Page title */
        .page-title {
            text-align: center;
            margin-bottom: 24px;
        }
        .page-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-title p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Cards */
        .card {
            background: var(--bg-raised);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--neu-raised);
            border: 1px solid var(--border);
        }

        /* Search */
        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 6px 6px 6px 16px;
            box-shadow: var(--neu-inset-sm);
        }
        .search-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            padding: 12px 4px;
            outline: none;
            min-width: 0;
        }
        .search-row input::placeholder { color: var(--text-muted); }
        .search-row button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--neu-raised-sm);
        }
        .search-row button:hover {
            transform: translateY(-1px);
            box-shadow: 4px 4px 12px var(--shadow-dark), -4px -4px 12px var(--shadow-light);
        }
        .search-row button:active {
            transform: translateY(0);
            box-shadow: var(--neu-inset-sm);
        }

        .disclaimer {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.7;
        }

        /* Stock header */
        .stock-header {
            padding: 18px 20px;
        }
        .stock-header .row1 {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        .stock-header .info {
            flex: 1;
            min-width: 0;
        }
        .stock-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stock-header .tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            background: var(--bg);
            color: var(--text-dim);
            box-shadow: var(--neu-inset-sm);
        }
        .tag.market {
            background: rgba(230, 126, 34, 0.15);
            color: var(--accent);
        }
        .stock-header .right {
            text-align: right;
        }
        .stock-header .price {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .stock-header .pct {
            font-size: 15px;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        .up { color: var(--up); }
        .down { color: var(--down); }

        /* Today card rows */
        .today-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .today-card .row:last-child { border-bottom: none; }
        .today-card .label { color: var(--text-dim); font-size: 13px; }
        .today-card .value {
            font-size: 15px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        .today-card .row.alert .value { color: var(--warn); }

        /* Accum card */
        .accum-card .title {
            padding: 0 0 14px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .accum-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .accum-card .row:last-child { border-bottom: none; }
        .accum-card .label-block .main { font-size: 14px; }
        .accum-card .label-block .sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .accum-card .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .accum-card .pct {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pill.safe { background: rgba(46, 160, 67, 0.15); color: var(--safe); }
        .status-pill.near { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
        .status-pill.triggered { background: rgba(248, 81, 73, 0.15); color: var(--danger); }

        /* Warning */
        .warning-block {
            background: rgba(210, 153, 34, 0.08);
            border-left: 3px solid var(--warn);
            padding: 12px 16px;
            margin: 16px 0;
            border-radius: 0 10px 10px 0;
            font-size: 12px;
            line-height: 1.7;
        }
        .warning-block .title { color: var(--warn); font-weight: 600; }
        .warning-block .desc { color: var(--text-dim); margin-top: 4px; }
        .warning-block.danger {
            background: rgba(248, 81, 73, 0.08);
            border-left-color: var(--danger);
        }
        .warning-block.danger .title { color: var(--danger); }

        /* Watchlist */
        .watchlist-section {
            margin-top: 24px;
        }
        .watchlist-section .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .watchlist-section .head h3 {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 500;
        }
        .watchlist-section .head .count {
            font-size: 12px;
            color: var(--text-muted);
        }
        .refresh-btn {
            background: var(--bg);
            border: none;
            color: var(--text-dim);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--neu-raised-sm);
        }
        .refresh-btn:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }
        .refresh-btn:active {
            box-shadow: var(--neu-inset-sm);
            transform: translateY(0);
        }
        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .watch-item {
            background: var(--bg-raised);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--neu-raised-sm);
        }
        .watch-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--neu-raised);
        }
        .watch-item:active {
            transform: translateY(0);
            box-shadow: var(--neu-inset-sm);
        }
        .watch-item.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), var(--neu-raised-sm);
        }
        .watch-item .left .name { font-size: 14px; font-weight: 500; }
        .watch-item .left .code { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
        .watch-item .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .watch-item .pct { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
        .watch-item .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            padding: 4px 8px;
            cursor: pointer;
            transition: color var(--transition);
        }
        .watch-item .delete-btn:hover { color: var(--danger); }

        /* Status bar */
        .status-bar {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 8px 0;
            margin: 12px 4px 0;
        }
        .status-bar.loading { color: var(--warn); }
        .status-bar.error { color: var(--danger); }
        .pulse {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .empty-tip {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            .stock-header .price { font-size: 24px; }
            .stock-header h2 { font-size: 18px; }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--bg-raised);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-left: 3px solid var(--danger);
        }
        .toast.success {
            border-left: 3px solid var(--safe);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--bg-raised);
            border-radius: 18px;
            padding: 24px;
            max-width: 360px;
            width: 90vw;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal {
            transform: scale(1);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        .modal-body {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-input {
            width: 100%;
            background: var(--bg);
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            box-shadow: var(--neu-inset-sm);
            margin-bottom: 16px;
        }
        .modal-input:focus {
            box-shadow: 0 0 0 2px var(--accent), var(--neu-inset-sm);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }
        .modal-btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--neu-raised-sm);
        }
        .modal-btn-primary:hover {
            transform: translateY(-1px);
        }
        .modal-btn-primary:active {
            transform: translateY(0);
            box-shadow: var(--neu-inset-sm);
        }
        .modal-btn-secondary {
            background: var(--bg);
            color: var(--text-dim);
            box-shadow: var(--neu-raised-sm);
        }
        .modal-btn-secondary:hover {
            color: var(--text);
        }
        .stock-pick-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .stock-pick-item {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition);
            margin-bottom: 4px;
        }
        .stock-pick-item:hover {
            background: var(--bg);
        }
        .stock-pick-item .code {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* === 新增样式 === */

        /* Sparkline */
        .sparkline-wrap {
            display: inline-flex;
            align-items: center;
            margin: 0 8px;
        }

        /* Watchlist action buttons */
        .watchlist-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .wl-action-btn {
            background: var(--bg);
            border: none;
            color: var(--text-dim);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--neu-raised-sm);
            font-size: 12px;
            position: relative;
        }
        .wl-action-btn:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }
        .wl-action-btn:active {
            box-shadow: var(--neu-inset-sm);
            transform: translateY(0);
        }
        .wl-action-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: 9px;
            min-width: 14px;
            height: 14px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            font-weight: 600;
        }
        .wl-action-btn.text-btn {
            width: auto;
            padding: 0 10px;
            font-size: 12px;
            gap: 4px;
        }

        /* Bell icon on watch item */
        .watch-item .bell-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 2px;
            cursor: pointer;
            transition: color var(--transition);
            display: flex;
            align-items: center;
        }
        .watch-item .bell-btn:hover { color: var(--accent); }
        .watch-item .bell-btn.has-alert { color: var(--warn); }

        /* Alert History */
        .alert-history-section {
            margin-top: 16px;
        }
        .alert-history-section .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
            cursor: pointer;
        }
        .alert-history-section .head h3 {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .alert-history-section .head .arrow {
            transition: transform var(--transition);
            color: var(--text-muted);
        }
        .alert-history-section .head .arrow.open {
            transform: rotate(90deg);
        }
        .alert-history-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .alert-history-list.expanded {
            max-height: 600px;
            overflow-y: auto;
        }
        .alert-entry {
            background: var(--bg-raised);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            font-size: 12px;
        }
        .alert-entry .alert-info {
            flex: 1;
            min-width: 0;
        }
        .alert-entry .alert-name {
            font-weight: 500;
            color: var(--text);
        }
        .alert-entry .alert-detail {
            color: var(--text-muted);
            margin-top: 2px;
        }
        .alert-entry .alert-time {
            color: var(--text-muted);
            font-size: 11px;
            white-space: nowrap;
            margin-left: 8px;
        }
        .clear-history-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all var(--transition);
        }
        .clear-history-btn:hover {
            color: var(--danger);
            background: rgba(248, 81, 73, 0.1);
        }

        /* Comparison Table */
        .comparison-section {
            margin-top: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .comparison-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12px;
            min-width: 500px;
        }
        .comparison-table th {
            background: var(--bg);
            color: var(--text-dim);
            font-weight: 500;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        .comparison-table th:first-child { border-radius: 10px 0 0 0; }
        .comparison-table th:last-child { border-radius: 0 10px 0 0; }
        .comparison-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .comparison-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        /* Enhanced detail indicators */
        .tech-summary {
            margin-top: 16px;
        }
        .tech-summary .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            padding-bottom: 14px;
        }
        .tech-signals {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tech-signal {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            background: var(--bg);
            color: var(--text-dim);
            box-shadow: var(--neu-inset-sm);
        }
        .tech-signal.bullish {
            background: rgba(248, 81, 73, 0.1);
            color: var(--up);
        }
        .tech-signal.bearish {
            background: rgba(46, 160, 67, 0.1);
            color: var(--down);
        }
        .tech-signal.neutral {
            background: rgba(210, 153, 34, 0.1);
            color: var(--warn);
        }

        /* Help button */

function showToast(msg, type) {

function showModal(opts) {
  return new Promise(resolve => {
    const overlay = document.getElementById('modalOverlay');

    const actions = document.getElementById('modalActions');

// ============ 配置:交易所异动规则 ============
function getThresholds(boardKey) {
  if (boardKey === "gem" || boardKey === "star") {
    return {
      "3d":  { up: 0.30, down: -0.30 },
      "10d": { up: 1.00, down: -0.50 },
      "30d": { up: 2.00, down: -0.70 },
    };
  }
  if (boardKey === "bj") {
    return {
      "3d":  { up: 0.40, down: -0.40 },
      "10d": { up: 1.00, down: -0.50 },
      "30d": { up: 2.00, down: -0.70 },
    };
  }
  return {
    "3d":  { up: 0.20, down: -0.20 },
    "10d": { up: 1.00, down: -0.50 },
    "30d": { up: 2.00, down: -0.70 },
  };
}

function makeStatus(threshold) {
  return (pct) => {
    if (pct >= threshold.up || pct <= threshold.down) return "triggered";
    const nearUp = threshold.up * 0.80;
    const nearDown = threshold.down * 0.80;
    if (pct >= nearUp || pct <= nearDown) return "near";
    return "safe";
  };
}

const ACCUM_RULES_DEF = [
  { key: "3d",  days: 3,  label: "3日累计",  method: "interval" },

  { key: "30d", days: 30, label: "30日累计", method: "interval" },
];

function getAccumRules(boardKey) {
  const thresholds = getThresholds(boardKey);
  return ACCUM_RULES_DEF.map(r => ({
    ...r,
    thresholds: thresholds[r.key],
    status: makeStatus(thresholds[r.key]),
  }));
}

const DAILY_LIMIT = {

};

// ============ 工具 ============
const NAME_MAP = {

};

function getName(code) {
  return NAME_MAP[code] || "股票" + code;
}

const NAME_INDEX = (() => {
  const idx = {};
  Object.entries(NAME_MAP).forEach(([c, n]) => {
    if (!idx[n]) idx[n] = c;
  });
  return idx;
})();

function searchByName(q) {
  if (NAME_INDEX[q]) return NAME_INDEX[q];
  const hits = Object.entries(NAME_MAP).filter(([c, n]) => n.includes(q));
  if (hits.length === 1) return hits[0][0];
  if (hits.length > 1) return hits;

}

function detectBoard(code) {
  if (/^688\d{3}$/.test(code)) return { key: "star", name: "科创板" };
  if (/^30[0-2]\d{3}$/.test(code)) return { key: "gem", name: "创业板" };
  if (/^8\d{5}$|^4\d{5}$/.test(code)) return { key: "bj", name: "北交所" };
  if (/^60[0-5]\d{3}$|^60[136]\d{3}$/.test(code)) return { key: "sh", name: "沪市" };
  if (/^00[0-2]\d{3}$|^000\d{3}$|^001\d{3}$|^002\d{3}$/.test(code)) return { key: "sz", name: "深市" };
  return { key: "sh", name: "沪市" };
}

function getIndexCode(boardKey) {
  switch (boardKey) {
    case "sh":   return "sh000001";
    case "sz":   return "sz399001";
    case "gem":  return "sz399006";
    case "star": return "sh000688";
    case "bj":   return "bj899050";
    default:     return "sh000001";
  }
}

function statusText(s) {
  return s === "safe" ? "安全" : s === "near" ? "临近" : "已触发";
}
function statusClass(s) { return s === "safe" ? "safe" : s === "near" ? "near" : "triggered"; }

function shouldWarnAbsolute(pct) {
  return pct <= -0.30 || pct >= 1.00;
}

function dailyPctSeries(series) {
  const out = [0];
  for (let i = 1; i < series.length; i++) {
    out.push((series[i] - series[i - 1]) / series[i - 1]);
  }
  return out;
}

function calcAccumInterval(stockSeries, idxSeries, days) {
  if (stockSeries.length < days + 1) return null;
  const today = stockSeries[stockSeries.length - 1];
  const past = stockSeries[stockSeries.length - 1 - days];
  if (!past) return null;
  const stockPct = (today - past) / past;
  let idxPct = 0;
  if (idxSeries && idxSeries.length >= days + 1) {
    const iToday = idxSeries[idxSeries.length - 1];
    const iPast = idxSeries[idxSeries.length - 1 - days];
    if (iPast) idxPct = (iToday - iPast) / iPast;
  }
  return stockPct - idxPct;
}

function calcAccumArith(stockSeries, idxSeries, days) {
  if (stockSeries.length < days + 1) return null;
  const sDps = dailyPctSeries(stockSeries);
  const iDps = dailyPctSeries(idxSeries || []);
  const startIdx = sDps.length - days;
  let sum = 0;
  for (let i = startIdx; i < sDps.length; i++) {
    sum += (sDps[i] - (iDps[i] || 0));
  }
  return sum;
}

function calcAccum(stockSeries, idxSeries, days, method) {
  if (method === 'arith') {
    return calcAccumArith(stockSeries, idxSeries, days);
  }
  return calcAccumInterval(stockSeries, idxSeries, days);
}

function calcMaxRange(stockSeries, idxSeries) {
  if (stockSeries.length < 2) return { pct: 0, days: 0 };
  const maxWindow = Math.min(30, stockSeries.length - 1);
  let max = -Infinity, maxDays = 0;
  for (let window = 3; window <= maxWindow; window++) {
    const today = stockSeries[stockSeries.length - 1];
    const past = stockSeries[stockSeries.length - 1 - window];
    if (!past) continue;
    let stockPct = (today - past) / past;
    let idxPct = 0;
    if (idxSeries && idxSeries.length >= window + 1) {
      const iToday = idxSeries[idxSeries.length - 1];
      const iPast = idxSeries[idxSeries.length - 1 - window];
      if (iPast) idxPct = (iToday - iPast) / iPast;
    }
    const dev = stockPct - idxPct;
    if (dev > max) { max = dev; maxDays = window; }
  }
  return { pct: max || 0, days: maxDays };
}

function calcNextDayWarning(series) {
  if (series.length < 2) return null;
  const last = series[series.length - 1];
  const prev = series[series.length - 2];
  const todayPct = (last - prev) / prev;
  return todayPct;
}

function fmtPct(p) {
  const sign = p >= 0 ? "+" : "";
  return sign + (p * 100).toFixed(2) + "%";
}

function sinaCode(code) {
  // 如果已经有前缀（sh/sz/bj），直接返回
  if (/^(sh|sz|bj)\d{6}$/.test(code)) return code;
  if (/^(60|68|9)\d{5}$/.test(code)) return "sh" + code;
  if (/^(00|30)\d{5}$/.test(code)) return "sz" + code;
  if (/^(4|8)\d{5}$/.test(code)) return "bj" + code;
  return "sh" + code;
}

// ============ 腾讯财经数据接口 ============
const CORS_PROXY = "https://api.codetabs.com/v1/proxy/?quest=";

function fetchQuotes(codes) {
  return new Promise((resolve, reject) => {
    if (codes.length === 0) return resolve({});
    const list = codes.map(sinaCode).join(",");
    const targetUrl = "https://qt.gtimg.cn/q=" + list;
    const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
    const timeout = setTimeout(() => reject(new Error("行情请求超时")), 15000);
    fetch(proxyUrl, { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.arrayBuffer();
      })
      .then(buf => {
        clearTimeout(timeout);
        const raw = new TextDecoder('gbk').decode(buf);
        const result = {};
        const lines = raw.split(";");
        codes.forEach(code => {
          const sc = sinaCode(code);
          const line = lines.find(l => l.includes("v_" + sc + "="));
          if (!line) return;
          const m = line.match(/="([^"]+)"/);
          if (!m) return;
          result[sc] = parseTencentData(m[1]);
        });
        if (Object.keys(result).length === 0) {
          reject(new Error("代理返回空数据"));
        } else {
          resolve(result);
        }
      })
      .catch(e => {
        clearTimeout(timeout);
        reject(e);
      });
  });
}

function parseTencentData(str) {
  const f = str.split("~");
  return {
    name: f[1] || "",
    code: f[2] || "",
    price: parseFloat(f[3]) || 0,
    prevClose: parseFloat(f[4]) || 0,
    open: parseFloat(f[5]) || 0,
    volume: parseFloat(f[6]) || 0,
    amount: parseFloat(f[37]) || 0,
    high: parseFloat(f[33]) || 0,
    low: parseFloat(f[34]) || 0,
    change: parseFloat(f[31]) || 0,
    changePct: parseFloat(f[32]) || 0,
    datetime: f[30] || "",
  };
}

function fetchKLine(code, count) {
  return fetchKLineRaw(code, count || 60);
}

function fetchKLineRaw(code, count) {
  count = count || 60;
  return new Promise((resolve, reject) => {
    const sc = sinaCode(code);
    const targetUrl = "https://web.ifzq.gtimg.cn/appstock/app/kline/kline?param=" + sc + ",day,,," + count;
    const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
    const timeout = setTimeout(() => reject(new Error("K线请求超时")), 15000);
    fetch(proxyUrl, { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(data => {
        clearTimeout(timeout);
        if (data && data.code !== 0) return reject(new Error("K线返回错误"));
        const list = data && data.data && data.data[sc] && data.data[sc].day;
        if (!list || list.length === 0) return reject(new Error("无K线数据"));
        const series = list.slice(-count).map(row => ({
          date: row[0],
          close: parseFloat(row[2]),
        }));
        resolve(series);
      })
      .catch(e => {
        clearTimeout(timeout);
        reject(e);
      });
  });
}

async function refreshStock(code) {
  const item = watchlist.find(s => s.code === code);
  if (!item) return;
  try {
    const board = detectBoard(code);
    const idxCode = getIndexCode(board.key);
    const [quotes, klines, idxKlines] = await Promise.all([
      fetchQuotes([code]),
      fetchKLine(code, 60).catch(e => { console.warn("个股K线失败", e); return null; }),
      fetchKLineRaw(idxCode, 60).catch(e => { console.warn("指数K线失败", e); return null; }),
    ]);
    const sc = sinaCode(code);
    const q = quotes[sc];
    if (q) {
      item.quote = q;
      if (q.name) item.name = q.name;
    }
    if (klines && klines.length > 0) {
      item.series = klines.map(k => k.close);
      item.seriesDates = klines.map(k => k.date);
    }
    if (idxKlines && idxKlines.length > 0) {
      item.idxSeries = idxKlines.map(k => k.close);
    }
    item.error = null;
  } catch (e) {
    console.error("刷新失败", code, e);
    item.error = e.message || "获取失败";
  }
}

    return;
  }
  const today = q ? q.price : (series[series.length - 1] || 0);
  const prev = q ? q.prevClose : (series[series.length - 2] || today);
  const dailyPct = q && q.changePct != null
    ? q.changePct / 100
    : (prev ? (today - prev) / prev : 0);
  
  // 计算指数当日涨跌幅
  const idxSeries = item.idxSeries || [];
  const idxToday = idxSeries[idxSeries.length - 1] || 0;
  const idxPrev = idxSeries[idxSeries.length - 2] || idxToday;
  const idxDailyPct = idxPrev ? (idxToday - idxPrev) / idxPrev : 0;
  
  // 当日偏离值 = 个股涨跌幅 - 指数涨跌幅
  const dailyDeviation = dailyPct - idxDailyPct;
  
  const board = detectBoard(item.code);
  const dailyLimit = DAILY_LIMIT[board.key] || 0.10;

  const pctClass = dailyPct >= 0 ? "up" : "down";
  
  // 涨跌停提醒
  const limitPct = dailyLimit * 100;
  const currentPct = dailyPct * 100;
  const nearLimit = Math.abs(currentPct) >= (limitPct - 2);
  const atLimit = Math.abs(currentPct) >= (limitPct - 0.1);
  
  // 生成涨跌停提醒HTML
  let limitWarningHtml = '';
  if (atLimit) {
    limitWarningHtml = '<div class="warning-block danger">' +
      '<div class="title">⚠ ' + (dailyPct >= 0 ? '涨停' : '跌停') + '</div>' +
      '<div class="desc">当前涨幅 ' + fmtPct(dailyPct) + '，已' + (dailyPct >= 0 ? '涨停' : '跌停') + '</div>' +
    '</div>';
  } else if (nearLimit) {
    const remain = limitPct - Math.abs(currentPct);
    limitWarningHtml = '<div class="warning-block">' +
      '<div class="title">⚠ 接近' + (dailyPct >= 0 ? '涨停' : '跌停') + '</div>' +

    '</div>';
  }

  const accums = getAccumRules(board.key).map(rule => {
    const pct = calcAccum(series, item.idxSeries, rule.days, rule.method) || 0;
    const status = rule.status(pct);
    return { pct: pct, status: status, label: rule.label, thresholds: rule.thresholds };
  });

  // 计算区间最大偏离值（3-29天窗口中偏离值最大的）
  function calcMaxRange(stockSeries, idxSeries) {
    if (stockSeries.length < 2) return { pct: 0, days: 0 };
    const maxWindow = Math.min(29, stockSeries.length - 1); // 最大29天
    let max = -Infinity, maxDays = 0;
    for (let window = 3; window <= maxWindow; window++) {
      const today = stockSeries[stockSeries.length - 1];
      const past = stockSeries[stockSeries.length - 1 - window];
      if (!past) continue;
      let stockPct = (today - past) / past;
      let idxPct = 0;
      if (idxSeries && idxSeries.length >= window + 1) {
        const iToday = idxSeries[idxSeries.length - 1];
        const iPast = idxSeries[idxSeries.length - 1 - window];
        if (iPast) idxPct = (iToday - iPast) / iPast;
      }
      const dev = stockPct - idxPct;
      if (dev > max) { max = dev; maxDays = window; }
    }
    return { pct: max || 0, days: maxDays };
  }

  const maxRange = calcMaxRange(series, item.idxSeries);

  const triggered30 = accums[2] && accums[2].status === "triggered";
  const triggered10 = accums[1] && accums[1].status === "triggered";

  // 记录触发的异动到预警历史
  accums.forEach(a => {

  let warningHtml = "";

    warningHtml = '<div class="warning-block danger">' +
      '<div class="title">⚠ 已触发异动</div>' +
      '<div class="desc">' + a.label + '累计偏离值 ' + fmtPct(a.pct) + '</div>' +
    '</div>';
  } else if (maxRange.pct >= 0.5) {
    // 区间最大偏离值接近阈值时显示预警
    // 使用30日阈值计算次日触发涨幅
    const threshold = maxRange.pct >= 0 ? 2.00 : -0.70;
    const triggerPct = ((1 + threshold) / (1 + maxRange.pct) - 1) * 100;
    const triggerPctStr = triggerPct.toFixed(2);
    const dirText = maxRange.pct >= 0 ? '涨幅' : '跌幅';
    warningHtml = '<div class="warning-block">' +
      '<div class="title">⚠ 区间最大</div>' +
      '<div class="desc">' + maxRange.days + '日累计偏离值 ' + fmtPct(maxRange.pct) + '</div>' +
      '<div class="desc" style="margin-top:4px">次日' + dirText + '偏离值达到+' + triggerPctStr + '%将触发严重异动</div>' +
    '</div>';
  }

  const quoteTime = (() => {
    if (!q || !q.datetime || q.datetime.length < 12) return "";
    const d = q.datetime;
    return d.slice(0,4) + "-" + d.slice(4,6) + "-" + d.slice(6,8) + " " + d.slice(8,10) + ":" + d.slice(10,12) + ":" + (d.slice(12,14) || "00");
  })();

  // 增强指标
  const indicators = calcEnhancedIndicators(item);
  const techSignals = generateTechSignals(item, accums);

  area.innerHTML =
    '<div class="card stock-header">' +
      '<div class="row1">' +
        '<div class="info">' +
          '<h2>' + (item.name || getName(item.code)) + '</h2>' +
          '<div class="tags">' +
            '<span class="tag market">' + board.name + '</span>' +
            '<span class="tag">' + item.code + '</span>' +
            (quoteTime ? '<span class="tag">' + quoteTime + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="right">' +
          '<div class="price ' + pctClass + '">' + today.toFixed(2) + '</div>' +
          '<div class="pct ' + pctClass + '">' + fmtPct(dailyPct) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="card today-card">' +
      '<div class="row">' +
        '<span class="label">个股涨幅</span>' +
        '<span class="value ' + pctClass + '">' + fmtPct(dailyPct) + '</span>' +
      '</div>' +
      '<div class="row">' +
        '<span class="label">涨跌额</span>' +
        '<span class="value ' + pctClass + '">' + (q && q.change != null ? (q.change >= 0 ? '+' : '') + q.change.toFixed(2) : ((today - prev) >= 0 ? '+' : '') + (today - prev).toFixed(2)) + '</span>' +
      '</div>' +
      '<div class="row">' +
        '<span class="label">今开 / 昨收</span>' +

      '</div>' +

      '</div>' +

      '</div>' +
      '<div class="row">' +
        '<span class="label">指数涨跌幅</span>' +
        '<span class="value" style="font-size:13px">' + fmtPct(idxDailyPct) + '</span>' +
      '</div>' +
      '<div class="row' + (Math.abs(dailyDeviation) >= dailyLimit ? ' alert' : '') + '">' +
        '<span class="label">当日偏离值</span>' +
        '<span class="value">' + (dailyDeviation * 100).toFixed(2) + '%</span>' +
      '</div>' +
    '</div>' +

    '<div class="card accum-card">' +
      '<div class="title">累计偏离值</div>' +
      accums.map(a => {
        const v = a.pct * 100;
        const cls = v >= 0 ? "up" : "down";

        return '<div class="row">' +
          '<div class="label-block">' +

    (techSignals.length > 0 ?

async function addStock() {
  const input = document.getElementById("stockInput");
  let q = input.value.trim();
  if (!q) {
    showToast("请输入股票代码或名称", "error");
    return;
  }

  let code = null;

  if (/^\d{6}$/.test(q)) {
    code = q;
  } else {
    const result = searchByName(q);
    if (typeof result === "string") {
      code = result;
    } else if (Array.isArray(result) && result.length > 1) {
      // 弹出选择框
      const pick = await pickStockModal(result);
      if (pick && /^\d{6}$/.test(pick)) {
        code = pick;
      } else {
        return;
      }
    } else {
      if (/^[a-zA-Z0-9]{1,6}$/.test(q)) {
        const ok = await confirmModal('未在名称表中找到 "' + q + '"，仍要尝试添加吗?');
        if (ok) {
          code = q.toUpperCase();
        }
      } else {
        await alertModal('找不到 "' + q + '"。\n提示：可以输入6位股票代码（如 601991），或在名称表中的股票名（如 宁德时代）。', '未找到');
        return;
      }
    }
  }

  if (!code) return;

  const isNew = !watchlist.find(s => s.code === code);
  if (isNew) {
    watchlist.push({ code: code, name: getName(code) });
    saveWatchlist();
  } else {
    const item = watchlist.find(s => s.code === code);
    delete item.quote;
    delete item.series;
    delete item.seriesDates;
    delete item.error;
  }
  activeCode = code;
  input.value = "";
  fetchStatus = "loading";
  renderStatusBar();
  renderAll();
  try {
    await refreshStock(code);
  } catch (e) {
    console.error("数据拉取失败", e);
  }
  fetchStatus = "idle";
  renderStatusBar();
  renderAll();
}

// ============ 新增功能: 迷你走势图 ============
function generateSparkline(series, width, height) {
  width = width || 60;
  height = height || 24;
  if (!series || series.length < 2) return '';
  const data = series.slice(-20);
  const min = Math.min.apply(null, data);
  const max = Math.max.apply(null, data);
  const range = max - min || 1;
  const isUp = data[data.length - 1] >= data[0];
  const color = isUp ? 'var(--up)' : 'var(--down)';
  const points = data.map(function(v, i) {
    var x = (i / (data.length - 1)) * width;
    var y = height - ((v - min) / range) * (height - 4) - 2;
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  return '<div class="sparkline-wrap"><svg width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '">' +
    '<polyline points="' + points + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg></div>';
}

var ALERT_HISTORY_KEY = 'stock_alert_history_v1';
var alertHistory = [];

function loadAlertHistory() {
  try {
    var raw = localStorage.getItem(ALERT_HISTORY_KEY);
    if (raw) alertHistory = JSON.parse(raw);
  } catch (e) { alertHistory = []; }
}

function saveAlertHistory() {
  try {
    // 只保留最近50条
    if (alertHistory.length > 50) alertHistory = alertHistory.slice(0, 50);
    localStorage.setItem(ALERT_HISTORY_KEY, JSON.stringify(alertHistory));
  } catch (e) {}
}

function logAlert(code, name, type, value, threshold) {
  // 去重: 同一股票同类型1小时内不重复记录
  var now = Date.now();
  var recent = alertHistory.find(function(h) {
    return h.code === code && h.type === type && (now - h.timestamp) < 3600000;
  });
  if (recent) return;
  alertHistory.unshift({
    code: code, name: name, type: type,
    value: value, threshold: threshold,
    timestamp: now
  });
  saveAlertHistory();
  renderAlertHistory();
}

function renderAlertHistory() {
  var container = document.getElementById('alertHistoryList');
  var countEl = document.getElementById('alertHistoryCount');
  if (!container) return;
  var history = alertHistory.slice(0, 20);
  if (countEl) countEl.textContent = history.length > 0 ? '(' + history.length + ')' : '';
  if (history.length === 0) {
    container.innerHTML = '<div class="empty-tip" style="padding:16px">暂无预警记录</div>';
    return;
  }
  container.innerHTML = history.map(function(h) {
    var d = new Date(h.timestamp);
    var timeStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    return '<div class="alert-entry">' +
      '<div class="alert-info">' +
        '<div class="alert-name">' + h.name + ' <span style="color:var(--text-muted);font-size:11px">' + h.code + '</span></div>' +
        '<div class="alert-detail">' + h.type + ' 偏离 ' + fmtPct(h.value) + ' (阈值 ' + fmtPct(h.threshold) + ')</div>' +
      '</div>' +
      '<div class="alert-time">' + timeStr + '</div>' +
    '</div>';
  }).join('');
}

function checkPriceAlerts() {
  var triggered = [];
  priceAlerts = priceAlerts.filter(function(alert) {
    var item = watchlist.find(function(s) { return s.code === alert.code; });
    if (!item || !item.quote) return true;
    var price = item.quote.price;
    if (!price) return true;
    var crossed = false;
    if (alert.direction === 'above' && price >= alert.target) crossed = true;
    if (alert.direction === 'below' && price <= alert.target) crossed = true;
    if (crossed) {
      triggered.push({ name: item.name || getName(item.code), code: alert.code, target: alert.target, price: price, direction: alert.direction });
      return false; // 移除已触发的
    }
    return true;
  });
  if (triggered.length > 0) {
    savePriceAlerts();
    triggered.forEach(function(t) {
      showToast(t.name + '(' + t.code + ') ' + (t.direction === 'above' ? '突破' : '跌破') + '目标价 ' + t.target.toFixed(2) + '，当前 ' + t.price.toFixed(2), 'success');
    });
    renderWatchlist();
  }
}

      '<div style="display:flex;gap:8px;margin-bottom:8px">' +
        '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;color:var(--text-dim)">' +
          '<input type="radio" name="priceDir" value="above" ' + (!existing || existing.direction === 'above' ? 'checked' : '') + ' /> 高于目标价时提醒' +
        '</label>' +
        '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;color:var(--text-dim)">' +
          '<input type="radio" name="priceDir" value="below" ' + (existing && existing.direction === 'below' ? 'checked' : '') + ' /> 低于目标价时提醒' +
        '</label>' +
      '</div>',
    buttons: [
      { text: '取消', value: null },
      { text: existing ? '更新' : '设置', value: '__set__', primary: true },
      existing ? { text: '删除', value: '__delete__' } : null
    ].filter(Boolean)
  });
  if (result === '__set__') {
    var val = parseFloat(document.getElementById('priceAlertInput').value);
    if (isNaN(val) || val <= 0) {
      showToast('请输入有效的价格', 'error');
      return;
    }
    var dir = 'above';
    var radios = document.querySelectorAll('input[name="priceDir"]');
    radios.forEach(function(r) { if (r.checked) dir = r.value; });
    // 移除旧的
    priceAlerts = priceAlerts.filter(function(a) { return a.code !== code; });
    priceAlerts.push({ code: code, target: val, direction: dir });
    savePriceAlerts();
    showToast('价格提醒已设置', 'success');
    renderWatchlist();
  } else if (result === '__delete__') {
    priceAlerts = priceAlerts.filter(function(a) { return a.code !== code; });
    savePriceAlerts();
    showToast('价格提醒已删除');
    renderWatchlist();
  }
}

// ============ 新增功能: 对比模式 ============
var compareMode = false;

function renderComparison() {
  var section = document.getElementById('comparisonSection');
  if (!section) return;
  if (!compareMode) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  var rows = watchlist.map(function(s) {
    var q = s.quote;
    var series = s.series || [];
    var today = q ? q.price : (series[series.length - 1] || 0);
    var prev = q ? q.prevClose : (series[series.length - 2] || today);
    var dailyPct = q && q.changePct != null ? q.changePct / 100 : (prev ? (today - prev) / prev : 0);
    var board = detectBoard(s.code);
    var accums = getAccumRules(board.key).map(function(rule) {
      var pct = calcAccum(series, s.idxSeries, rule.days, rule.method) || 0;
      return { label: rule.label, pct: pct, status: rule.status(pct) };
    });
    var cls = dailyPct >= 0 ? 'up' : 'down';
    return '<tr>' +
      '<td>' + s.code + '</td>' +
      '<td style="font-weight:500">' + (s.name || getName(s.code)) + '</td>' +
      '<td class="' + cls + '">' + fmtPct(dailyPct) + '</td>' +
      accums.map(function(a) {
        var vCls = a.pct >= 0 ? 'up' : 'down';
        var st = statusClass(shouldWarnAbsolute(a.pct) && a.status === 'safe' ? 'near' : a.status);
        return '<td><span class="' + vCls + '">' + fmtPct(a.pct) + '</span> <span class="status-pill ' + st + '" style="font-size:10px;padding:2px 6px">' + statusText(shouldWarnAbsolute(a.pct) && a.status === 'safe' ? 'near' : a.status) + '</span></td>';
      }).join('') +
    '</tr>';
  }).join('');
  section.innerHTML = '<table class="comparison-table">' +
    '<thead><tr><th>代码</th><th>名称</th><th>当日涨幅</th><th>3日偏离</th><th>10日偏离</th><th>30日偏离</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

// ============ 新增功能: 批量导入导出 ============
function exportWatchlist() {
  var data = watchlist.map(function(s) { return { code: s.code, name: s.name }; });
  var json = JSON.stringify(data, null, 2);
  // 尝试下载
  try {
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'watchlist_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('已导出监控列表', 'success');
  } catch (e) {
    // fallback: 复制到剪贴板
    navigator.clipboard.writeText(json).then(function() {
      showToast('已复制到剪贴板', 'success');
    }).catch(function() {
      showToast('导出失败', 'error');
    });
  }
}

async function importWatchlist() {
  var result = await showModal({
    title: '导入监控列表',
    bodyHtml: '<div style="margin-bottom:12px;color:var(--text-dim);font-size:13px">支持两种格式：</div>' +
      '<div style="margin-bottom:8px;color:var(--text-muted);font-size:12px">1. JSON数组: [{"code":"601991","name":"大唐发电"}]</div>' +
      '<div style="margin-bottom:12px;color:var(--text-muted);font-size:12px">2. 每行一个6位股票代码</div>' +
      '<textarea class="import-textarea" id="importTextarea" placeholder="在此粘贴..."></textarea>',
    buttons: [
      { text: '取消', value: null },
      { text: '导入', value: '__import__', primary: true }
    ]
  });
  if (result !== '__import__') return;
  var text = (document.getElementById('importTextarea') || {}).value || '';
  text = text.trim();
  if (!text) { showToast('内容为空', 'error'); return; }
  var imported = [];
  // 尝试JSON解析
  try {
    var arr = JSON.parse(text);
    if (Array.isArray(arr)) {
      arr.forEach(function(item) {
        if (item && item.code && /^\d{6}$/.test(String(item.code))) {
          imported.push({ code: String(item.code), name: item.name || getName(String(item.code)) });
        }
      });
    }
  } catch (e) {}
  // 如果JSON没解析到，尝试按行解析
  if (imported.length === 0) {
    text.split(/[\n,;]+/).forEach(function(line) {
      var code = line.trim();
      if (/^\d{6}$/.test(code)) {
        imported.push({ code: code, name: getName(code) });
      }
    });
  }
  if (imported.length === 0) {
    showToast('未识别到有效股票代码', 'error');
    return;
  }
  // 合并去重
  var added = 0;
  imported.forEach(function(item) {
    var exists = watchlist.find(function(s) { return s.code === item.code; });
    if (!exists) {
      watchlist.push({ code: item.code, name: item.name });
      added++;
    }
  });
  if (added > 0) {
    saveWatchlist();
    renderAll();
    showToast('成功导入 ' + added + ' 只股票', 'success');
  } else {
    showToast('所有股票已在监控列表中', 'info');
  }
}

// ============ 新增功能: 增强技术指标 ============
function calcEnhancedIndicators(item) {
  var q = item.quote;
  var series = item.series || [];
  if (!q && series.length === 0) return null;
  var today = q ? q.price : (series[series.length - 1] || 0);
  var prev = q ? q.prevClose : (series[series.length - 2] || today);
  var high = q && q.high ? q.high : today;
  var low = q && q.low ? q.low : today;
  var volume = q ? q.volume : 0;
  var amount = q ? q.amount : 0;
  // 振幅
  var amplitude = prev ? ((high - low) / prev * 100) : 0;
  // 量比 (当前成交量 vs 5日平均成交量)
  var volumeRatio = 0;
  if (series.length >= 6 && volume > 0) {
    // 用K线最后5天的成交量估算（如果没有成交量数据，用价格变化幅度估算活跃度）
    // 这里简单用当日量和历史估算
    var avgVol = volume * 0.8; // 粗略估计
    volumeRatio = avgVol > 0 ? (volume / avgVol) : 0;
  }
  // 市值估算 - 腾讯接口不直接提供，标记为不可用
  var marketCap = null;
  // 换手率估算
  var turnoverRate = null;
  return {
    amplitude: amplitude,
    volumeRatio: volumeRatio,
    marketCap: marketCap,
    turnoverRate: turnoverRate
  };
}

function generateTechSignals(item, accums) {
  var signals = [];
  var q = item.quote;
  var series = item.series || [];
  if (!q) return signals;
  var dailyPct = q.changePct / 100;
  // 涨跌停信号
  var board = detectBoard(item.code);
  var limit = DAILY_LIMIT[board.key] || 0.10;
  if (Math.abs(dailyPct) >= limit - 0.001) {
    signals.push({ text: dailyPct > 0 ? '涨停' : '跌停', cls: dailyPct > 0 ? 'bullish' : 'bearish' });
  } else if (Math.abs(dailyPct) >= limit * 0.8) {
    signals.push({ text: dailyPct > 0 ? '接近涨停' : '接近跌停', cls: 'neutral' });
  }
  // 量价信号
  if (q.volume && q.amount) {
    var avgPrice = q.volume > 0 ? q.amount / q.volume : 0;
    if (avgPrice > 0 && q.price > avgPrice * 1.02) {
      signals.push({ text: '量价齐升', cls: 'bullish' });
    }
  }
  // 异动信号
  accums.forEach(function(a) {
    if (a.status === 'triggered') {
      signals.push({ text: a.label + '异动', cls: 'bearish' });
    } else if (a.status === 'near') {
      signals.push({ text: a.label + '临近', cls: 'neutral' });
    }
  });
  // 连续涨跌信号
  if (series.length >= 4) {
    var last3 = series.slice(-4);
    var allUp = last3[1] > last3[0] && last3[2] > last3[1] && last3[3] > last3[2];
    var allDown = last3[1] < last3[0] && last3[2] < last3[1] && last3[3] < last3[2];
    if (allUp) signals.push({ text: '3连阳', cls: 'bullish' });
    if (allDown) signals.push({ text: '3连阴', cls: 'bearish' });
  }
  // 大幅波动
  if (Math.abs(dailyPct) >= 0.05) {
    signals.push({ text: '大幅波动', cls: 'neutral' });
  }
  return signals;
}

// ============ 原 bootstrap 前的初始化 ============
let fetchStatus = "idle";
let fetchErrorDetail = "";

function renderStatusBar() {
  const bar = document.getElementById("statusBar");
  if (!bar) return;
  if (fetchStatus === "loading") {
    bar.className = "status-bar loading";
    bar.innerHTML = '<span class="pulse"></span>正在获取实时行情...';
  } else if (fetchStatus === "error") {
    bar.className = "status-bar error";
    bar.innerHTML = "⚠ 实时数据获取失败: " + (fetchErrorDetail || "未知错误");
  } else {
    bar.className = "status-bar";
    const t = new Date().toLocaleTimeString("zh-CN");
    bar.innerHTML = '<span class="pulse"></span>实时数据 · ' + t + ' 更新';
  }
}

async function refreshQuotes() {
  if (watchlist.length === 0) return;
  try {
    const codes = watchlist.map(s => s.code);
    const data = await fetchQuotes(codes);
    let got = 0;
    watchlist.forEach(s => {
      const sc = sinaCode(s.code);
      const q = data[sc];
      if (q) {
        s.quote = q;
        if (q.name) s.name = q.name;
        // 注意：不再用实时价格覆盖K线收盘价，保持K线数据的纯正性
        // 实时价格仅用于显示当前价和涨跌幅
        got++;
      }
    });
    if (got === 0) {
      fetchStatus = "error";
      fetchErrorDetail = "接口未返回任何数据";
    } else {
      fetchStatus = "idle";
      fetchErrorDetail = "";
    }
  } catch (e) {
    console.error("refreshQuotes 失败", e);
    fetchStatus = "error";
    fetchErrorDetail = e.message || "请求失败";
  }
  renderStatusBar();
  renderAll();
  checkPriceAlerts();
}

async function refreshAllKLines() {
  for (const s of watchlist) {
    try {
      const board = detectBoard(s.code);
      const idxCode = getIndexCode(board.key);
      const [klines, idxKlines] = await Promise.all([
        fetchKLine(s.code, 60).catch(e => { console.warn("个股K线失败", e); return null; }),
        fetchKLineRaw(idxCode, 60).catch(e => { console.warn("指数K线失败", e); return null; })
      ]);
      if (klines && klines.length > 0) {
        s.series = klines.map(k => k.close);
        s.seriesDates = klines.map(k => k.date);
      }
      if (idxKlines && idxKlines.length > 0) {
        s.idxSeries = idxKlines.map(k => k.close);
      }
    } catch (e) { /* 静默 */ }
  }
  renderAll();
}

async function bootstrap() {
  loadWatchlist();
  loadAlertHistory();
  loadPriceAlerts();
  renderWatchlist();
  renderStatusBar();
  renderAll();

  fetchStatus = "loading";
  renderStatusBar();
  await refreshAllKLines();
  await refreshQuotes();

  // 添加刷新按钮事件
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', async () => {
      refreshBtn.classList.add('spinning');
      fetchStatus = "loading";
      renderStatusBar();
      await refreshAllKLines();
      await refreshQuotes();
      checkPriceAlerts();
      refreshBtn.classList.remove('spinning');
    });
  }

  // 导入导出按钮
  var importBtn = document.getElementById('importBtn');
  if (importBtn) importBtn.addEventListener('click', importWatchlist);
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', exportWatchlist);

  // 对比模式按钮
  var compareBtn = document.getElementById('compareBtn');
  if (compareBtn) compareBtn.addEventListener('click', function() {
    compareMode = !compareMode;
    compareBtn.style.color = compareMode ? 'var(--accent)' : '';
    renderComparison();
  });

  // 预警历史折叠
  var historyToggle = document.getElementById('alertHistoryToggle');
  if (historyToggle) historyToggle.addEventListener('click', function() {
    var list = document.getElementById('alertHistoryList');
    var arrow = document.getElementById('alertHistoryArrow');
    if (list) list.classList.toggle('expanded');
    if (arrow) arrow.classList.toggle('open');
  });

  // 清空预警历史
  var clearBtn = document.getElementById('clearHistoryBtn');
  if (clearBtn) clearBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    alertHistory = [];
    saveAlertHistory();
    renderAlertHistory();
    showToast('预警历史已清空');
  });

  // 帮助按钮
  var helpFab = document.getElementById('helpFab');
  if (helpFab) helpFab.addEventListener('click', showShortcutsModal);

  // 键盘快捷键
  document.addEventListener('keydown', function(e) {
    // Esc 关闭弹窗
    if (e.key === 'Escape') {
      closeModal();
      return;
    }
    // Ctrl/Cmd+R 或 F5 刷新数据
    if ((e.key === 'r' && (e.ctrlKey || e.metaKey)) || e.key === 'F5') {
      e.preventDefault();
      if (refreshBtn) refreshBtn.click();
      return;
    }
    // ? 显示帮助 (仅在非输入状态)
    if (e.key === '?' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      showShortcutsModal();
    }
  });
}

bootstrap();
