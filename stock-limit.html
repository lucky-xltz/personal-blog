<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>涨跌停监控 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#1f1a16;--bg-raised:#2a231c;--shadow-dark:rgba(0,0,0,.55);--shadow-light:rgba(255,255,255,.04);--accent:#e67e22;--text:#e0e5ec;--text-dim:#a0a8b8;--text-muted:#7a8494;--border:rgba(255,255,255,.06);--up:#f85149;--down:#2ea043;--warn:#d29922;--radius-md:18px;--radius-sm:12px;--neu-raised:6px 6px 14px var(--shadow-dark),-6px -6px 14px var(--shadow-light);--neu-inset-sm:inset 2px 2px 5px var(--shadow-dark),inset -2px -2px 5px var(--shadow-light);--transition:.3s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
        body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        .nav{background:rgba(31,26,22,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:700;color:var(--accent);text-decoration:none}
        .nav-links{display:flex;gap:24px;list-style:none}
        .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem;transition:color var(--transition)}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .container{max-width:640px;margin:0 auto;padding:24px 16px}
        .page-title{text-align:center;margin-bottom:24px}
        .page-title h1{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-title p{color:var(--text-dim);font-size:.85rem;margin-top:8px}
        .up{color:var(--up)}.down{color:var(--down)}
        .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
        .toolbar select{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;cursor:pointer}
        .toolbar select:focus{border-color:var(--accent)}
        .btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition);box-shadow:var(--neu-raised-sm)}
        .btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
        .status-bar{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
        .status-bar.loading{color:var(--accent)}
        .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:6px;vertical-align:middle;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
        .stat-card{background:var(--bg-raised);border-radius:var(--radius-sm);padding:16px;text-align:center;box-shadow:var(--neu-raised);border:1px solid var(--border)}
        .stat-card .num{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
        .stat-card .label{font-size:12px;color:var(--text-dim);margin-top:4px}
        .limit-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
        .limit-table th{background:var(--bg-raised);color:var(--text-dim);font-weight:500;padding:12px 14px;text-align:left;white-space:nowrap;position:sticky;top:0}
        .limit-table th:first-child{border-radius:10px 0 0 0}
        .limit-table th:last-child{border-radius:0 10px 0 0}
        .limit-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap}
        .limit-table tr:hover td{background:rgba(255,255,255,.02)}
        .limit-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500}
        .limit-tag.limit-up{background:rgba(248,81,73,.15);color:var(--up)}
        .limit-tag.limit-down{background:rgba(46,160,67,.15);color:var(--down)}
        .limit-tag.near-up{background:rgba(248,81,73,.08);color:var(--up)}
        .limit-tag.near-down{background:rgba(46,160,67,.08);color:var(--down)}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg-raised);border-radius:var(--radius-md);box-shadow:var(--neu-raised);border:1px solid var(--border)}
        .footer{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:.8rem}
        .footer a{color:var(--accent);text-decoration:none}
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--bg-raised);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:10000;opacity:0;transition:all .3s;pointer-events:none;max-width:90vw;text-align:center}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">林小白</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="stock-tools.html" class="active">股票工具</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">
        <h1>涨跌停监控</h1>
        <p>实时监控涨停/跌停股票 · 捕捉市场极端情绪</p>
    </div>

    <div class="toolbar">
        <select id="boardSelect">
            <option value="all">全部板块</option>
            <option value="sh">沪市主板</option>
            <option value="sz">深市主板</option>
            <option value="gem">创业板</option>
            <option value="star">科创板</option>
        </select>
        <select id="typeSelect">
            <option value="all">涨停+跌停</option>
            <option value="up">仅涨停</option>
            <option value="down">仅跌停</option>
        </select>
        <button class="btn" id="refreshBtn">查询</button>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="status-bar" id="statusBar"><span class="pulse"></span>输入股票代码查询涨跌停状态</div>
    <div class="table-wrap" id="tableWrap" style="display:none">
        <table class="limit-table">
            <thead><tr><th>代码</th><th>名称</th><th>现价</th><th>涨跌幅</th><th>状态</th><th>成交额</th></tr></thead>
            <tbody id="limitBody"></tbody>
        </table>
    </div>
</div>

<footer class="footer">
    <p>数据来源：腾讯财经 · 仅供学习参考</p>
    <p style="margin-top:8px"><a href="stock-tools.html">← 返回工具箱</a></p>
</footer>

<div class="toast" id="toast"></div>

<script>
const CORS_PROXY = "https://api.codetabs.com/v1/proxy/?quest=";

// 常见股票池（用于涨跌停扫描）
const STOCK_POOLS = {
    sh: ["600519","600036","601318","601991","600905","600886","600025","600011","600795","601728","601857","600028","600030","601066","601628","601336","601012","601688","600104","600690","600588","603629"],
    sz: ["000001","000858","000333","000651","002415","002475","000725","002714","002594","002230","002460","002241","000568","000776","002352"],
    gem: ["300750","300059","300015","300760","300124","300274","300014","300033","300059","300122","300142","300274"],
    star: ["688981","688041","688111","688036","688009","688012","688005","688002","688003","688006"]
};

function showToast(msg, type) {
  type = type || 'info';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

function sinaCode(code) {
  if (/^(sh|sz|bj)\d{6}$/.test(code)) return code;
  if (/^(60|68|9)\d{5}$/.test(code)) return "sh" + code;
  if (/^(00|30)\d{5}$/.test(code)) return "sz" + code;
  return "sh" + code;
}

function fetchQuotes(codes) {
  return new Promise((resolve, reject) => {
    if (!codes.length) return resolve({});
    const list = codes.map(c => sinaCode(c)).join(",");
    const url = CORS_PROXY + encodeURIComponent("https://qt.gtimg.cn/q=" + list);
    const timeout = setTimeout(() => reject(new Error("超时")), 20000);
    fetch(url, { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => {
        clearTimeout(timeout);
        const raw = new TextDecoder('gbk').decode(buf);
        const result = {};
        raw.split(";").forEach(line => {
          const m = line.match(/v_(\w+)="([^"]+)"/);
          if (m) {
            const f = m[2].split("~");
            result[m[1]] = {
              name: f[1]||"", code: f[2]||"", price: parseFloat(f[3])||0,
              prevClose: parseFloat(f[4])||0, changePct: parseFloat(f[32])||0,
              change: parseFloat(f[31])||0, amount: parseFloat(f[37])||0,
            };
          }
        });
        resolve(result);
      })
      .catch(e => { clearTimeout(timeout); reject(e); });
  });
}

function fmtPct(p) { return (p>=0?"+":"") + (p*100).toFixed(2) + "%"; }
function fmtAmt(v) { if(!v) return "—"; return v>=1e8 ? (v/1e8).toFixed(2)+"亿" : v>=1e4 ? (v/1e4).toFixed(0)+"万" : v.toFixed(0); }

function getLimitPct(code) {
  if (/^688/.test(code) || /^30[0-2]/.test(code)) return 20;
  if (/^8/.test(code) || /^4/.test(code)) return 30;
  return 10;
}

async function queryLimits() {
  const board = document.getElementById("boardSelect").value;
  const type = document.getElementById("typeSelect").value;
  const bar = document.getElementById("statusBar");
  bar.className = "status-bar loading";
  bar.innerHTML = '<span class="pulse"></span>正在扫描...';

  let codes = [];
  if (board === "all") {
    Object.values(STOCK_POOLS).forEach(pool => codes.push(...pool));
  } else {
    codes = STOCK_POOLS[board] || [];
  }
  // 去重
  codes = [...new Set(codes)];

  try {
    const data = await fetchQuotes(codes);
    let items = Object.values(data).map(q => {
      const limitPct = getLimitPct(q.code);
      const pct = q.changePct;
      let status = "normal";
      if (Math.abs(pct) >= limitPct - 0.05) status = pct > 0 ? "limit-up" : "limit-down";
      else if (Math.abs(pct) >= limitPct * 0.8) status = pct > 0 ? "near-up" : "near-down";
      return { ...q, limitPct, status };
    });

    // 筛选
    if (type === "up") items = items.filter(i => i.status === "limit-up" || i.status === "near-up");
    else if (type === "down") items = items.filter(i => i.status === "limit-down" || i.status === "near-down");
    else items = items.filter(i => i.status !== "normal");

    // 排序
    items.sort((a, b) => Math.abs(b.changePct) - Math.abs(a.changePct));

    // 统计
    const limitUp = items.filter(i => i.status === "limit-up").length;
    const limitDown = items.filter(i => i.status === "limit-down").length;
    const nearLimit = items.filter(i => i.status === "near-up" || i.status === "near-down").length;

    document.getElementById("statsRow").innerHTML =
      '<div class="stat-card"><div class="num up">' + limitUp + '</div><div class="label">涨停</div></div>' +
      '<div class="stat-card"><div class="num down">' + limitDown + '</div><div class="label">跌停</div></div>' +
      '<div class="stat-card"><div class="num" style="color:var(--warn)">' + nearLimit + '</div><div class="label">临近涨跌停</div></div>';

    const table = document.getElementById("tableWrap");
    const body = document.getElementById("limitBody");

    if (items.length === 0) {
      table.style.display = "none";
      bar.className = "status-bar";
      bar.innerHTML = "未找到涨跌停股票";
      return;
    }

    table.style.display = "block";
    body.innerHTML = items.map(i => {
      const cls = i.changePct >= 0 ? "up" : "down";
      const tagCls = i.status.replace("-", "-");
      const tagText = i.status === "limit-up" ? "涨停" : i.status === "limit-down" ? "跌停" : i.status === "near-up" ? "近涨停" : "近跌停";
      return '<tr>' +
        '<td>' + i.code + '</td>' +
        '<td style="font-weight:500">' + i.name + '</td>' +
        '<td class="' + cls + '">' + i.price.toFixed(2) + '</td>' +
        '<td class="' + cls + '">' + fmtPct(i.changePct/100) + '</td>' +
        '<td><span class="limit-tag ' + tagCls + '">' + tagText + '</span></td>' +
        '<td>' + fmtAmt(i.amount) + '</td>' +
      '</tr>';
    }).join("");

    bar.className = "status-bar";
    bar.innerHTML = '<span class="pulse"></span>扫描完成 · ' + new Date().toLocaleTimeString("zh-CN");
  } catch(e) {
    bar.className = "status-bar";
    bar.innerHTML = "查询失败: " + e.message;
  }
}

document.getElementById("refreshBtn").onclick = queryLimits;
</script>
</body>
</html>
