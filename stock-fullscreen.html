<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>全屏看板 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1f1a16; --bg-raised: #2a231c;
            --shadow-dark: rgba(0,0,0,0.55); --shadow-light: rgba(255,255,255,0.04);
            --accent: #e67e22; --text: #e0e5ec; --text-dim: #a0a8b8; --text-muted: #7a8494;
            --border: rgba(255,255,255,0.06); --up: #f85149; --down: #2ea043;
            --radius-md: 18px; --radius-sm: 12px;
            --neu-raised: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
            --neu-raised-sm: 3px 3px 8px var(--shadow-dark), -3px -3px 8px var(--shadow-light);
            --neu-inset-sm: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body { 
            font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; 
            background:var(--bg); color:var(--text); font-size:14px; 
            height:100vh; overflow:hidden;
        }
        .up { color:var(--up); } .down { color:var(--down); }

        /* 全屏布局 */
        .fullscreen-container {
            height:100vh; display:flex; flex-direction:column;
        }

        /* 顶部搜索栏 */
        .top-bar {
            background:rgba(31,26,22,0.98); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border); padding:16px 24px;
            display:flex; align-items:center; gap:16px; z-index:100;
        }
        .back-btn {
            background:none; border:none; color:var(--text-dim); font-size:20px;
            cursor:pointer; padding:8px; transition:color var(--transition);
        }
        .back-btn:hover { color:var(--accent); }
        .search-box {
            flex:1; display:flex; gap:10px; align-items:center;
            background:var(--bg); border-radius:var(--radius-sm); padding:6px 6px 6px 16px;
            box-shadow:var(--neu-inset-sm); max-width:400px;
        }
        .search-box input {
            flex:1; background:transparent; border:none; color:var(--text);
            font-size:15px; padding:12px 4px; outline:none; min-width:0;
        }
        .search-box input::placeholder { color:var(--text-muted); }
        .search-box button {
            background:var(--accent); color:#fff; border:none; padding:10px 20px;
            border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;
            transition:all var(--transition); white-space:nowrap;
        }
        .search-box button:hover { transform:translateY(-1px); }
        .status-indicator {
            display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted);
        }
        .pulse { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--down); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* 主内容区 */
        .main-content {
            flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto 1fr;
            gap:16px; padding:16px; overflow:hidden;
        }

        /* 股票信息卡片 */
        .stock-info {
            grid-column:1 / -1; background:var(--bg-raised); border-radius:var(--radius-md);
            padding:24px; box-shadow:var(--neu-raised); border:1px solid var(--border);
        }
        .stock-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
        .stock-name { font-family:'Outfit',sans-serif; font-size:28px; font-weight:700; }
        .stock-code { font-size:14px; color:var(--text-muted); margin-top:4px; }
        .stock-price { text-align:right; }
        .price-value { font-size:48px; font-weight:700; font-variant-numeric:tabular-nums; }
        .price-change { font-size:18px; font-weight:500; margin-top:4px; }
        .price-pct { font-size:18px; font-weight:500; margin-top:2px; }

        /* 详细数据网格 */
        .details-grid {
            display:grid; grid-template-columns:repeat(4, 1fr); gap:16px;
            padding-top:20px; border-top:1px solid var(--border);
        }
        .detail-item { text-align:center; }
        .detail-label { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
        .detail-value { font-size:16px; font-weight:600; font-variant-numeric:tabular-nums; }

        /* 图表区域 */
        .chart-area {
            background:var(--bg-raised); border-radius:var(--radius-md);
            padding:20px; box-shadow:var(--neu-raised); border:1px solid var(--border);
            display:flex; flex-direction:column;
        }
        .chart-header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
        }
        .chart-title { font-size:14px; font-weight:600; color:var(--text-dim); }
        .chart-tabs { display:flex; gap:8px; }
        .chart-tab {
            background:var(--bg); border:1px solid var(--border); border-radius:8px;
            padding:6px 12px; font-size:12px; color:var(--text-muted); cursor:pointer;
            transition:all var(--transition);
        }
        .chart-tab:hover, .chart-tab.active {
            background:var(--accent); color:#fff; border-color:var(--accent);
        }
        .chart-container { flex:1; position:relative; min-height:0; cursor:crosshair; }
        .chart-container canvas { width:100%; height:100%; }

        /* 悬浮信息框 */
        .tooltip {
            position:absolute; background:rgba(42,35,28,0.95); border:1px solid var(--border);
            border-radius:12px; padding:12px 16px; pointer-events:none; z-index:100;
            opacity:0; transition:opacity 0.15s ease; min-width:180px;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .tooltip.visible { opacity:1; }
        .tooltip-title { font-size:12px; color:var(--text-muted); margin-bottom:8px; }
        .tooltip-row { display:flex; justify-content:space-between; gap:16px; margin-bottom:4px; }
        .tooltip-label { font-size:12px; color:var(--text-dim); }
        .tooltip-value { font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; }

        /* 十字线 */
        .crosshair { position:absolute; pointer-events:none; z-index:50; }
        .crosshair-line { position:absolute; background:rgba(255,255,255,0.2); }
        .crosshair-h { height:1px; left:0; right:0; }
        .crosshair-v { width:1px; top:0; bottom:0; }
        .crosshair-label {
            position:absolute; background:var(--accent); color:#fff; padding:2px 8px;
            border-radius:4px; font-size:10px; font-weight:600; white-space:nowrap;
        }

        /* 右侧指标面板 */
        .indicators-panel {
            background:var(--bg-raised); border-radius:var(--radius-md);
            padding:20px; box-shadow:var(--neu-raised); border:1px solid var(--border);
            overflow-y:auto;
        }
        .indicator-section { margin-bottom:20px; }
        .indicator-title { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--accent); }
        .indicator-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .indicator-item { background:var(--bg); border-radius:var(--radius-sm); padding:12px; }
        .indicator-label { font-size:11px; color:var(--text-muted); }
        .indicator-value { font-size:16px; font-weight:600; margin-top:4px; font-variant-numeric:tabular-nums; }

        /* 空状态 */
        .empty-state {
            grid-column:1 / -1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:16px;
            color:var(--text-muted); padding:48px;
        }
        .empty-icon { font-size:48px; opacity:0.5; }
        .empty-text { font-size:16px; }

        /* 更新时间 */
        .update-time {
            position:fixed; bottom:16px; right:16px;
            background:var(--bg-raised); border-radius:var(--radius-sm);
            padding:8px 16px; font-size:11px; color:var(--text-muted);
            box-shadow:var(--neu-raised-sm);
        }

        /* 响应式 */
        @media(max-width:768px) {
            .main-content { grid-template-columns:1fr; }
            .details-grid { grid-template-columns:repeat(2, 1fr); }
            .stock-header { flex-direction:column; gap:12px; }
            .stock-price { text-align:left; }
            .price-value { font-size:36px; }
        }
    </style>
</head>
<body>

<div class="fullscreen-container">
    <!-- 顶部搜索栏 -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='stock-tools.html'" title="返回工具箱">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <div class="search-box">
            <input id="stockInput" placeholder="输入股票代码，如 601991" autofocus />
            <button id="searchBtn">查看</button>
        </div>
        <div class="status-indicator">
            <span class="pulse"></span>
            <span id="statusText">等待输入</span>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
        <div class="empty-state">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 3v18h18"/>
                    <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
                </svg>
            </div>
            <div class="empty-text">输入股票代码开始查看全屏看板</div>
        </div>
    </div>
</div>

<div class="update-time" id="updateTime" style="display:none">
    最后更新: <span id="lastUpdate">--:--:--</span>
</div>

<script>
const CORS_PROXY = "https://api.codetabs.com/v1/proxy/?quest=";
let currentStock = null;
let refreshTimer = null;
let klineData = [];
let timelineData = [];
let currentChart = 'timeline'; // 'timeline' or 'kline'
let currentQuote = null;

// 股票代码转换
function sinaCode(code) {
    if (/^(sh|sz|bj)\d{6}$/.test(code)) return code;
    if (/^(60|68|9)\d{5}$/.test(code)) return "sh" + code;
    if (/^(00|30)\d{5}$/.test(code)) return "sz" + code;
    if (/^(4|8)\d{5}$/.test(code)) return "bj" + code;
    return "sh" + code;
}

// 获取实时行情
function fetchQuote(code) {
    return new Promise((resolve, reject) => {
        const sc = sinaCode(code);
        const url = CORS_PROXY + encodeURIComponent("https://qt.gtimg.cn/q=" + sc);
        const timeout = setTimeout(() => reject(new Error("请求超时")), 10000);
        fetch(url, { cache: "no-store" })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
            .then(buf => {
                clearTimeout(timeout);
                const raw = new TextDecoder('gbk').decode(buf);
                const m = raw.match(/v_(\w+)="([^"]+)"/);
                if (!m) throw new Error("数据解析失败");
                const f = m[2].split("~");
                resolve({
                    name: f[1] || "", code: f[2] || "", price: parseFloat(f[3]) || 0,
                    prevClose: parseFloat(f[4]) || 0, open: parseFloat(f[5]) || 0,
                    volume: parseFloat(f[6]) || 0, amount: parseFloat(f[37]) || 0,
                    high: parseFloat(f[33]) || 0, low: parseFloat(f[34]) || 0,
                    changePct: parseFloat(f[32]) || 0, change: parseFloat(f[31]) || 0,
                    turnover: parseFloat(f[38]) || 0, pe: parseFloat(f[39]) || 0,
                    marketCap: parseFloat(f[44]) || 0, 流通市值: parseFloat(f[45]) || 0,
                });
            })
            .catch(e => { clearTimeout(timeout); reject(e); });
    });
}

// 获取分时数据
function fetchTimeline(code) {
    return new Promise((resolve, reject) => {
        const sc = sinaCode(code);
        const targetUrl = "https://web.ifzq.gtimg.cn/appstock/app/minute/query?code=" + sc;
        const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
        const timeout = setTimeout(() => reject(new Error("分时数据请求超时")), 10000);
        fetch(proxyUrl, { cache: "no-store" })
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                clearTimeout(timeout);
                if (data && data.code !== 0) return reject(new Error("分时数据返回错误"));
                const minutes = data && data.data && data.data[sc] && data.data[sc].data && data.data[sc].data.data;
                if (!minutes || minutes.length === 0) return reject(new Error("无分时数据"));
                
                const prevClose = parseFloat(data.data[sc].qt[sc][4]) || 0;
                const result = minutes.map(item => {
                    const parts = item.split(" ");
                    const time = parts[0];
                    const price = parseFloat(parts[1]) || 0;
                    const volume = parseFloat(parts[2]) || 0;
                    const amount = parseFloat(parts[3]) || 0;
                    return { time, price, volume, amount, changePct: prevClose ? ((price - prevClose) / prevClose * 100) : 0 };
                });
                resolve(result);
            })
            .catch(e => { clearTimeout(timeout); reject(e); });
    });
}

// 获取K线数据
function fetchKLine(code, count) {
    return new Promise((resolve, reject) => {
        const sc = sinaCode(code);
        const targetUrl = "https://web.ifzq.gtimg.cn/appstock/app/kline/kline?param=" + sc + ",day,,," + (count || 120);
        const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
        const timeout = setTimeout(() => reject(new Error("K线请求超时")), 15000);
        fetch(proxyUrl, { cache: "no-store" })
            .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(data => {
                clearTimeout(timeout);
                if (data && data.code !== 0) return reject(new Error("K线返回错误"));
                const list = data && data.data && data.data[sc] && data.data[sc].day;
                if (!list || list.length === 0) return reject(new Error("无K线数据"));
                const series = list.slice(-count).map(row => ({
                    date: row[0], open: parseFloat(row[1]), close: parseFloat(row[2]),
                    high: parseFloat(row[3]), low: parseFloat(row[4]), volume: parseFloat(row[5]) || 0,
                }));
                resolve(series);
            })
            .catch(e => { clearTimeout(timeout); reject(e); });
    });
}

// 格式化函数
function fmtPct(p) { return (p>=0?"+":"") + p.toFixed(2) + "%"; }
function fmtPrice(p) { return p ? p.toFixed(2) : "--"; }
function fmtVol(v) {
    if (!v) return "--";
    if (v >= 1e8) return (v/1e8).toFixed(2) + "亿";
    if (v >= 1e4) return (v/1e4).toFixed(0) + "万";
    return v.toFixed(0);
}
function fmtCap(v) {
    if (!v) return "--";
    if (v >= 1e8) return (v/1e8).toFixed(2) + "亿";
    if (v >= 1e4) return (v/1e4).toFixed(0) + "万";
    return v.toFixed(0);
}

// 绘制分时图
function drawTimelineChart(canvas, data, quote) {
    if (!data || data.length === 0 || !quote) return;
    
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const width = rect.width;
    const height = rect.height;
    const padding = { top: 20, right: 60, bottom: 30, left: 10 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;
    
    // 计算价格范围
    const prices = data.map(d => d.price);
    const minPrice = Math.min(...prices, quote.prevClose);
    const maxPrice = Math.max(...prices, quote.prevClose);
    const priceRange = Math.max(maxPrice - minPrice, quote.prevClose * 0.02) || 1;
    
    // 清空画布
    ctx.clearRect(0, 0, width, height);
    
    // 绘制昨收线
    const prevCloseY = padding.top + ((maxPrice - quote.prevClose) / priceRange * chartHeight);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(padding.left, prevCloseY);
    ctx.lineTo(width - padding.right, prevCloseY);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // 绘制网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartHeight * i / 4);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();
    }
    
    // 绘制分时线
    const stepX = chartWidth / (data.length - 1);
    
    // 绘制填充区域
    ctx.beginPath();
    ctx.moveTo(padding.left, prevCloseY);
    data.forEach((d, i) => {
        const x = padding.left + (i * stepX);
        const y = padding.top + ((maxPrice - d.price) / priceRange * chartHeight);
        ctx.lineTo(x, y);
    });
    ctx.lineTo(padding.left + ((data.length - 1) * stepX), prevCloseY);
    ctx.closePath();
    
    const lastPrice = data[data.length - 1].price;
    const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
    if (lastPrice >= quote.prevClose) {
        gradient.addColorStop(0, 'rgba(248,81,73,0.3)');
        gradient.addColorStop(1, 'rgba(248,81,73,0.05)');
    } else {
        gradient.addColorStop(0, 'rgba(46,160,67,0.05)');
        gradient.addColorStop(1, 'rgba(46,160,67,0.3)');
    }
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // 绘制价格线
    ctx.beginPath();
    ctx.strokeStyle = lastPrice >= quote.prevClose ? '#f85149' : '#2ea043';
    ctx.lineWidth = 2;
    data.forEach((d, i) => {
        const x = padding.left + (i * stepX);
        const y = padding.top + ((maxPrice - d.price) / priceRange * chartHeight);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // 绘制价格标签
    ctx.fillStyle = '#7a8494';
    ctx.font = '11px Inter';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
        const price = maxPrice - (priceRange * i / 4);
        const y = padding.top + (chartHeight * i / 4);
        ctx.fillText(price.toFixed(2), width - 8, y + 4);
    }
    
    // 绘制时间标签
    ctx.textAlign = 'center';
    const timeLabels = ['09:30', '10:30', '11:30', '14:00', '15:00'];
    timeLabels.forEach((time, i) => {
        const x = padding.left + (chartWidth * i / (timeLabels.length - 1));
        ctx.fillText(time, x, height - 8);
    });
    
    // 绘制涨跌幅标签
    ctx.textAlign = 'left';
    const pctRange = (maxPrice - quote.prevClose) / quote.prevClose * 100;
    const minPct = (minPrice - quote.prevClose) / quote.prevClose * 100;
    for (let i = 0; i <= 4; i++) {
        const pct = pctRange - ((pctRange - minPct) * i / 4);
        const y = padding.top + (chartHeight * i / 4);
        const cls = pct >= 0 ? '#f85149' : '#2ea043';
        ctx.fillStyle = cls;
        ctx.fillText((pct >= 0 ? '+' : '') + pct.toFixed(2) + '%', 4, y + 4);
    }
    
    // 存储数据点用于交互
    canvas._chartData = {
        type: 'timeline',
        data: data,
        quote: quote,
        padding: padding,
        chartWidth: chartWidth,
        chartHeight: chartHeight,
        stepX: stepX,
        priceRange: priceRange,
        maxPrice: maxPrice,
        prevCloseY: prevCloseY
    };
}

// 绘制K线图
function drawKLineChart(canvas, data) {
    if (!data || data.length === 0) return;
    
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    const width = rect.width;
    const height = rect.height;
    const padding = { top: 20, right: 60, bottom: 30, left: 10 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;
    
    // 计算价格范围
    const prices = data.flatMap(d => [d.high, d.low]);
    const minPrice = Math.min(...prices);
    const maxPrice = Math.max(...prices);
    const priceRange = maxPrice - minPrice || 1;
    
    const candleWidth = Math.max(2, (chartWidth / data.length) * 0.7);
    const gap = chartWidth / data.length;
    
    // 清空画布
    ctx.clearRect(0, 0, width, height);
    
    // 绘制网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartHeight * i / 4);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();
    }
    
    // 绘制K线
    data.forEach((d, i) => {
        const x = padding.left + (i * gap) + (gap / 2);
        const isUp = d.close >= d.open;
        const color = isUp ? '#f85149' : '#2ea043';
        
        // 影线
        const highY = padding.top + ((maxPrice - d.high) / priceRange * chartHeight);
        const lowY = padding.top + ((maxPrice - d.low) / priceRange * chartHeight);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, highY);
        ctx.lineTo(x, lowY);
        ctx.stroke();
        
        // 实体
        const openY = padding.top + ((maxPrice - d.open) / priceRange * chartHeight);
        const closeY = padding.top + ((maxPrice - d.close) / priceRange * chartHeight);
        const bodyTop = Math.min(openY, closeY);
        const bodyHeight = Math.max(1, Math.abs(openY - closeY));
        
        ctx.fillStyle = color;
        ctx.fillRect(x - candleWidth/2, bodyTop, candleWidth, bodyHeight);
    });
    
    // 绘制价格标签
    ctx.fillStyle = '#7a8494';
    ctx.font = '11px Inter';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
        const price = maxPrice - (priceRange * i / 4);
        const y = padding.top + (chartHeight * i / 4);
        ctx.fillText(price.toFixed(2), width - 8, y + 4);
    }
    
    // 绘制日期标签
    ctx.textAlign = 'center';
    const dateStep = Math.max(1, Math.floor(data.length / 5));
    for (let i = 0; i < data.length; i += dateStep) {
        const x = padding.left + (i * gap) + (gap / 2);
        const date = data[i].date;
        ctx.fillText(date.substring(5), x, height - 8); // 只显示月-日
    }
    
    // 绘制成交量柱状图
    const volumeHeight = height * 0.15;
    const volumeTop = height - volumeHeight - padding.bottom;
    const maxVolume = Math.max(...data.map(d => d.volume));
    
    data.forEach((d, i) => {
        const x = padding.left + (i * gap) + (gap / 2);
        const isUp = d.close >= d.open;
        const color = isUp ? 'rgba(248,81,73,0.5)' : 'rgba(46,160,67,0.5)';
        const barHeight = maxVolume > 0 ? (d.volume / maxVolume * volumeHeight * 0.8) : 0;
        
        ctx.fillStyle = color;
        ctx.fillRect(x - candleWidth/2, volumeTop + volumeHeight - barHeight, candleWidth, barHeight);
    });
    
    // 存储数据点用于交互
    canvas._chartData = {
        type: 'kline',
        data: data,
        padding: padding,
        chartWidth: chartWidth,
        chartHeight: chartHeight,
        gap: gap,
        priceRange: priceRange,
        maxPrice: maxPrice
    };
}

// 渲染股票信息
function renderStockInfo(quote) {
    const cls = quote.changePct >= 0 ? 'up' : 'down';
    const amp = quote.prevClose ? ((quote.high - quote.low) / quote.prevClose * 100).toFixed(2) : '--';
    
    return `
        <div class="stock-info">
            <div class="stock-header">
                <div>
                    <div class="stock-name">${quote.name || '未知'}</div>
                    <div class="stock-code">${quote.code}</div>
                </div>
                <div class="stock-price">
                    <div class="price-value ${cls}">${fmtPrice(quote.price)}</div>
                    <div class="price-change ${cls}">${quote.change >= 0 ? '+' : ''}${quote.change.toFixed(2)}</div>
                    <div class="price-pct ${cls}">${fmtPct(quote.changePct)}</div>
                </div>
            </div>
            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-label">今开</div>
                    <div class="detail-value">${fmtPrice(quote.open)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">昨收</div>
                    <div class="detail-value">${fmtPrice(quote.prevClose)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">最高</div>
                    <div class="detail-value up">${fmtPrice(quote.high)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">最低</div>
                    <div class="detail-value down">${fmtPrice(quote.low)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">成交量</div>
                    <div class="detail-value">${fmtVol(quote.volume)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">成交额</div>
                    <div class="detail-value">${fmtVol(quote.amount)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">振幅</div>
                    <div class="detail-value">${amp}%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">换手率</div>
                    <div class="detail-value">${quote.turnover ? quote.turnover.toFixed(2) + '%' : '--'}</div>
                </div>
            </div>
        </div>
    `;
}

// 渲染指标面板
function renderIndicators(quote, klineData) {
    const indicators = [];
    
    // 计算MA均线
    if (klineData && klineData.length >= 5) {
        const ma5 = klineData.slice(-5).reduce((sum, d) => sum + d.close, 0) / 5;
        indicators.push({ label: 'MA5', value: fmtPrice(ma5) });
    }
    if (klineData && klineData.length >= 10) {
        const ma10 = klineData.slice(-10).reduce((sum, d) => sum + d.close, 0) / 10;
        indicators.push({ label: 'MA10', value: fmtPrice(ma10) });
    }
    if (klineData && klineData.length >= 20) {
        const ma20 = klineData.slice(-20).reduce((sum, d) => sum + d.close, 0) / 20;
        indicators.push({ label: 'MA20', value: fmtPrice(ma20) });
    }
    
    // 计算涨跌幅
    if (klineData && klineData.length >= 2) {
        const today = klineData[klineData.length - 1].close;
        const yesterday = klineData[klineData.length - 2].close;
        const pct = ((today - yesterday) / yesterday * 100).toFixed(2);
        indicators.push({ label: '日涨跌', value: pct + '%', cls: pct >= 0 ? 'up' : 'down' });
    }
    
    // 计算5日涨跌
    if (klineData && klineData.length >= 6) {
        const today = klineData[klineData.length - 1].close;
        const fiveDaysAgo = klineData[klineData.length - 6].close;
        const pct5 = ((today - fiveDaysAgo) / fiveDaysAgo * 100).toFixed(2);
        indicators.push({ label: '5日涨跌', value: pct5 + '%', cls: pct5 >= 0 ? 'up' : 'down' });
    }
    
    // PE和市值
    if (quote.pe) indicators.push({ label: '市盈率', value: quote.pe.toFixed(2) });
    if (quote.marketCap) indicators.push({ label: '总市值', value: fmtCap(quote.marketCap) });
    if (quote.流通市值) indicators.push({ label: '流通值', value: fmtCap(quote.流通市值) });
    
    return `
        <div class="indicators-panel">
            <div class="indicator-section">
                <div class="indicator-title">技术指标</div>
                <div class="indicator-grid">
                    ${indicators.map(ind => `
                        <div class="indicator-item">
                            <div class="indicator-label">${ind.label}</div>
                            <div class="indicator-value ${ind.cls || ''}">${ind.value}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

// 渲染图表区域
function renderChartArea() {
    return `
        <div class="chart-area">
            <div class="chart-header">
                <div class="chart-title" id="chartTitle">分时走势</div>
                <div class="chart-tabs">
                    <button class="chart-tab ${currentChart === 'timeline' ? 'active' : ''}" onclick="switchChart('timeline')">分时</button>
                    <button class="chart-tab ${currentChart === 'kline' ? 'active' : ''}" onclick="switchChart('kline')">K线</button>
                </div>
            </div>
            <div class="chart-container" id="chartContainer">
                <canvas id="mainChart"></canvas>
                <div class="tooltip" id="tooltip">
                    <div class="tooltip-title" id="tooltipTitle"></div>
                    <div id="tooltipContent"></div>
                </div>
                <div class="crosshair" id="crosshair">
                    <div class="crosshair-line crosshair-h" id="crosshairH"></div>
                    <div class="crosshair-line crosshair-v" id="crosshairV"></div>
                    <div class="crosshair-label" id="crosshairPrice"></div>
                    <div class="crosshair-label" id="crosshairTime"></div>
                </div>
            </div>
        </div>
    `;
}

// 切换图表类型
function switchChart(type) {
    currentChart = type;
    
    // 更新标签样式
    document.querySelectorAll('.chart-tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent === (type === 'timeline' ? '分时' : 'K线'));
    });
    
    // 更新标题
    document.getElementById('chartTitle').textContent = type === 'timeline' ? '分时走势' : 'K线走势';
    
    // 重绘图表
    drawCurrentChart();
}

// 绘制当前图表
function drawCurrentChart() {
    const canvas = document.getElementById('mainChart');
    if (!canvas) return;
    
    if (currentChart === 'timeline' && timelineData.length > 0 && currentQuote) {
        drawTimelineChart(canvas, timelineData, currentQuote);
    } else if (currentChart === 'kline' && klineData.length > 0) {
        drawKLineChart(canvas, klineData);
    }
}

// 处理鼠标移动
function handleMouseMove(e) {
    const canvas = document.getElementById('mainChart');
    const tooltip = document.getElementById('tooltip');
    const crosshair = document.getElementById('crosshair');
    
    if (!canvas || !canvas._chartData || !tooltip || !crosshair) return;
    
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const chartData = canvas._chartData;
    
    // 检查是否在图表区域内
    if (x < chartData.padding.left || x > rect.width - chartData.padding.right ||
        y < chartData.padding.top || y > rect.height - chartData.padding.bottom) {
        tooltip.classList.remove('visible');
        crosshair.style.display = 'none';
        return;
    }
    
    crosshair.style.display = 'block';
    
    // 绘制十字线
    const crosshairH = document.getElementById('crosshairH');
    const crosshairV = document.getElementById('crosshairV');
    crosshairH.style.top = y + 'px';
    crosshairV.style.left = x + 'px';
    
    // 计算对应的数据点
    let dataPoint = null;
    let tooltipContent = '';
    
    if (chartData.type === 'timeline') {
        const index = Math.round((x - chartData.padding.left) / chartData.stepX);
        if (index >= 0 && index < chartData.data.length) {
            dataPoint = chartData.data[index];
            const price = dataPoint.price;
            const changePct = dataPoint.changePct;
            const cls = changePct >= 0 ? 'up' : 'down';
            
            tooltipContent = `
                <div class="tooltip-row">
                    <span class="tooltip-label">时间</span>
                    <span class="tooltip-value">${dataPoint.time}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">价格</span>
                    <span class="tooltip-value ${cls}">${fmtPrice(price)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">涨跌幅</span>
                    <span class="tooltip-value ${cls}">${fmtPct(changePct)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">成交量</span>
                    <span class="tooltip-value">${fmtVol(dataPoint.volume)}</span>
                </div>
            `;
            
            // 更新十字线标签
            document.getElementById('crosshairPrice').textContent = fmtPrice(price);
            document.getElementById('crosshairPrice').style.top = (y - 10) + 'px';
            document.getElementById('crosshairPrice').style.left = (rect.width - chartData.padding.right + 5) + 'px';
            document.getElementById('crosshairPrice').style.display = 'block';
            
            document.getElementById('crosshairTime').textContent = dataPoint.time;
            document.getElementById('crosshairTime').style.top = (rect.height - chartData.padding.bottom + 5) + 'px';
            document.getElementById('crosshairTime').style.left = (x - 20) + 'px';
            document.getElementById('crosshairTime').style.display = 'block';
        }
    } else if (chartData.type === 'kline') {
        const index = Math.floor((x - chartData.padding.left) / chartData.gap);
        if (index >= 0 && index < chartData.data.length) {
            dataPoint = chartData.data[index];
            const isUp = dataPoint.close >= dataPoint.open;
            const cls = isUp ? 'up' : 'down';
            
            tooltipContent = `
                <div class="tooltip-row">
                    <span class="tooltip-label">日期</span>
                    <span class="tooltip-value">${dataPoint.date}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">开盘</span>
                    <span class="tooltip-value">${fmtPrice(dataPoint.open)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">收盘</span>
                    <span class="tooltip-value ${cls}">${fmtPrice(dataPoint.close)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">最高</span>
                    <span class="tooltip-value up">${fmtPrice(dataPoint.high)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">最低</span>
                    <span class="tooltip-value down">${fmtPrice(dataPoint.low)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">成交量</span>
                    <span class="tooltip-value">${fmtVol(dataPoint.volume)}</span>
                </div>
            `;
            
            // 更新十字线标签
            const priceAtMouse = chartData.maxPrice - ((y - chartData.padding.top) / chartData.chartHeight * chartData.priceRange);
            document.getElementById('crosshairPrice').textContent = fmtPrice(priceAtMouse);
            document.getElementById('crosshairPrice').style.top = (y - 10) + 'px';
            document.getElementById('crosshairPrice').style.left = (rect.width - chartData.padding.right + 5) + 'px';
            document.getElementById('crosshairPrice').style.display = 'block';
            
            document.getElementById('crosshairTime').textContent = dataPoint.date.substring(5);
            document.getElementById('crosshairTime').style.top = (rect.height - chartData.padding.bottom + 5) + 'px';
            document.getElementById('crosshairTime').style.left = (x - 20) + 'px';
            document.getElementById('crosshairTime').style.display = 'block';
        }
    }
    
    if (dataPoint) {
        document.getElementById('tooltipTitle').textContent = currentChart === 'timeline' ? '分时详情' : 'K线详情';
        document.getElementById('tooltipContent').innerHTML = tooltipContent;
        tooltip.classList.add('visible');
        
        // 定位tooltip
        let tooltipX = x + 15;
        let tooltipY = y - 10;
        if (tooltipX + 180 > rect.width) tooltipX = x - 195;
        if (tooltipY + 150 > rect.height) tooltipY = rect.height - 160;
        tooltip.style.left = tooltipX + 'px';
        tooltip.style.top = tooltipY + 'px';
    } else {
        tooltip.classList.remove('visible');
    }
}

// 加载股票数据
async function loadStock(code) {
    if (!code) return;
    
    currentStock = code;
    document.getElementById('statusText').textContent = '加载中...';
    
    try {
        const [quote, timeline, klines] = await Promise.all([
            fetchQuote(code),
            fetchTimeline(code).catch(e => { console.warn('分时数据获取失败:', e); return []; }),
            fetchKLine(code, 120).catch(e => { console.warn('K线获取失败:', e); return []; })
        ]);
        
        currentQuote = quote;
        timelineData = timeline || [];
        klineData = klines || [];
        
        const mainContent = document.getElementById('mainContent');
        mainContent.innerHTML = `
            ${renderStockInfo(quote)}
            ${renderChartArea()}
            ${renderIndicators(quote, klineData)}
        `;
        
        // 绘制图表
        drawCurrentChart();
        
        // 添加鼠标事件
        const chartContainer = document.getElementById('chartContainer');
        chartContainer.addEventListener('mousemove', handleMouseMove);
        chartContainer.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').classList.remove('visible');
            document.getElementById('crosshair').style.display = 'none';
        });
        
        // 更新状态
        document.getElementById('statusText').textContent = '实时更新中';
        document.getElementById('updateTime').style.display = 'block';
        updateLastTime();
        
    } catch (e) {
        console.error('加载失败:', e);
        document.getElementById('statusText').textContent = '加载失败';
        document.getElementById('mainContent').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="empty-text">加载失败: ${e.message}</div>
            </div>
        `;
    }
}

// 更新最后更新时间
function updateLastTime() {
    const now = new Date();
    document.getElementById('lastUpdate').textContent = 
        now.getHours().toString().padStart(2,'0') + ':' + 
        now.getMinutes().toString().padStart(2,'0') + ':' + 
        now.getSeconds().toString().padStart(2,'0');
}

// 自动刷新
function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(async () => {
        if (currentStock) {
            try {
                const [quote, timeline] = await Promise.all([
                    fetchQuote(currentStock),
                    fetchTimeline(currentStock).catch(e => { console.warn('分时数据刷新失败:', e); return null; })
                ]);
                
                currentQuote = quote;
                if (timeline && timeline.length > 0) {
                    timelineData = timeline;
                }
                
                // 更新价格显示
                const priceEl = document.querySelector('.price-value');
                const changeEl = document.querySelector('.price-change');
                const pctEl = document.querySelector('.price-pct');
                if (priceEl) {
                    const cls = quote.changePct >= 0 ? 'up' : 'down';
                    priceEl.textContent = fmtPrice(quote.price);
                    priceEl.className = 'price-value ' + cls;
                    changeEl.textContent = (quote.change >= 0 ? '+' : '') + quote.change.toFixed(2);
                    changeEl.className = 'price-change ' + cls;
                    pctEl.textContent = fmtPct(quote.changePct);
                    pctEl.className = 'price-pct ' + cls;
                }
                
                // 重绘分时图
                if (currentChart === 'timeline' && timelineData.length > 0) {
                    const canvas = document.getElementById('mainChart');
                    if (canvas) drawTimelineChart(canvas, timelineData, currentQuote);
                }
                
                updateLastTime();
            } catch (e) {
                console.warn('自动刷新失败:', e);
            }
        }
    }, 5000); // 每5秒刷新
}

// 事件监听
document.getElementById('searchBtn').addEventListener('click', () => {
    const code = document.getElementById('stockInput').value.trim();
    if (code) {
        loadStock(code);
        startAutoRefresh();
    }
});

document.getElementById('stockInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const code = e.target.value.trim();
        if (code) {
            loadStock(code);
            startAutoRefresh();
        }
    }
});

// 窗口大小改变时重绘图表
window.addEventListener('resize', () => {
    drawCurrentChart();
});

// 初始化
document.getElementById('stockInput').focus();
</script>
