<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>板块热力图 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#1f1a16;--bg-raised:#2a231c;--shadow-dark:rgba(0,0,0,.55);--shadow-light:rgba(255,255,255,.04);--accent:#e67e22;--text:#e0e5ec;--text-dim:#a0a8b8;--text-muted:#7a8494;--border:rgba(255,255,255,.06);--up:#f85149;--down:#2ea043;--radius-md:18px;--radius-sm:12px;--neu-raised:6px 6px 14px var(--shadow-dark),-6px -6px 14px var(--shadow-light);--transition:.3s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
        body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        .nav{background:rgba(31,26,22,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:700;color:var(--accent);text-decoration:none}
        .nav-links{display:flex;gap:24px;list-style:none}
        .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem;transition:color var(--transition)}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .container-wide{max-width:960px;margin:0 auto;padding:24px 16px}
        .page-title{text-align:center;margin-bottom:24px}
        .page-title h1{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-title p{color:var(--text-dim);font-size:.85rem;margin-top:8px}
        .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;justify-content:space-between}
        .status-bar{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
        .status-bar.loading{color:var(--accent)}
        .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:6px;vertical-align:middle;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .refresh-btn{background:var(--bg-raised);border:none;color:var(--text-dim);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);box-shadow:3px 3px 8px var(--shadow-dark),-3px -3px 8px var(--shadow-light)}
        .refresh-btn:hover{color:var(--accent)}.refresh-btn.spinning svg{animation:spin 1s linear infinite}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));gap:8px}
        .heat-cell{border-radius:var(--radius-sm);padding:16px 12px;text-align:center;cursor:pointer;transition:all var(--transition);border:1px solid transparent;position:relative;overflow:hidden}
        .heat-cell:hover{transform:scale(1.02);border-color:rgba(255,255,255,.2)}
        .heat-cell .sector-name{font-size:13px;font-weight:600;margin-bottom:4px;position:relative}
        .heat-cell .pct{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;position:relative}
        .heat-cell .stocks{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px;position:relative}
        .legend-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0;font-size:11px;color:var(--text-muted)}
        .legend-gradient{width:200px;height:8px;border-radius:4px;background:linear-gradient(90deg,#2ea043,#1f1a16,#f85149)}
        .footer{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:.8rem}
        .footer a{color:var(--accent);text-decoration:none}
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">林小白</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="stock-tools.html" class="active">股票工具</a></li>
    </ul>
</nav>

<div class="container-wide">
    <div class="page-title">
        <h1>板块热力图</h1>
        <p>行业板块涨跌分布 · 市场热点一目了然</p>
    </div>

    <div class="toolbar">
        <div class="status-bar" id="statusBar"><span class="pulse"></span>加载中...</div>
        <button class="refresh-btn" id="refreshBtn" title="刷新">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
    </div>

    <div class="legend-bar">
        <span>跌</span>
        <div class="legend-gradient"></div>
        <span>涨</span>
    </div>

    <div class="heatmap-grid" id="heatmap"></div>
</div>

<footer class="footer">
    <p>数据来源：腾讯财经 · 仅供学习参考</p>
    <p style="margin-top:8px"><a href="stock-tools.html">← 返回工具箱</a></p>
</footer>

<script>
const CORS_PROXY = "https://api.codetabs.com/v1/proxy/?quest=";

// 板块及其代表股票
const SECTORS = [
    { name: "银行", stocks: ["601398","601288","601939","600036","600000"] },
    { name: "证券", stocks: ["601688","600030","601066","601211","600958"] },
    { name: "保险", stocks: ["601318","601628","601336","601601","600919"] },
    { name: "白酒", stocks: ["600519","000858","000568","002304","600809"] },
    { name: "医药", stocks: ["600276","300015","300760","002007","600196"] },
    { name: "新能源", stocks: ["300750","300274","601012","002459","300014"] },
    { name: "半导体", stocks: ["688981","688041","002049","300661","603501"] },
    { name: "汽车", stocks: ["002594","601633","600104","000625","601238"] },
    { name: "房地产", stocks: ["000002","001979","600048","000069","600383"] },
    { name: "钢铁", stocks: ["600019","000898","600010","000709","600022"] },
    { name: "煤炭", stocks: ["601088","600188","601898","600395","601001"] },
    { name: "电力", stocks: ["601991","600905","600886","600025","600795"] },
    { name: "石油", stocks: ["601857","600028","600688","000963","600871"] },
    { name: "通信", stocks: ["600050","601728","000063","300628","600522"] },
    { name: "消费电子", stocks: ["002475","002241","603160","300433","002456"] },
    { name: "人工智能", stocks: ["002230","300033","688111","300496","688018"] },
];

function fetchQuotes(codes) {
  return new Promise((resolve, reject) => {
    if (!codes.length) return resolve({});
    const list = codes.map(c => {
      if (/^6[0-9]\d{4}$/.test(c)) return "sh" + c;
      if (/^(0[0-2]|3[0-2])\d{4}$/.test(c)) return "sz" + c;
      return "sh" + c;
    }).join(",");
    const url = CORS_PROXY + encodeURIComponent("https://qt.gtimg.cn/q=" + list);
    const timeout = setTimeout(() => reject(new Error("超时")), 20000);
    fetch(url, { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => {
        clearTimeout(timeout);
        const raw = new TextDecoder('gbk').decode(buf);
        const result = {};
        raw.split(";").forEach(line => {
          const m = line.match(/v_(\w+)="([^"]+)"/);
          if (m) {
            const f = m[2].split("~");
            result[m[1]] = { name: f[1]||"", changePct: parseFloat(f[32])||0 };
          }
        });
        resolve(result);
      })
      .catch(e => { clearTimeout(timeout); reject(e); });
  });
}

function getHeatColor(pct) {
    // pct: -5 to +5 mapped to green to red
    const t = Math.max(-5, Math.min(5, pct)) / 5; // -1 to 1
    if (t > 0) {
        const r = Math.round(31 + t * (248 - 31));
        const g = Math.round(26 + t * (81 - 26));
        const b = Math.round(22 + t * (73 - 22));
        return "rgba(" + r + "," + g + "," + b + ",0.8)";
    } else {
        const absT = -t;
        const r = Math.round(31 + absT * (46 - 31));
        const g = Math.round(26 + absT * (160 - 26));
        const b = Math.round(22 + absT * (67 - 22));
        return "rgba(" + r + "," + g + "," + b + ",0.8)";
    }
}

async function refreshHeatmap() {
    const bar = document.getElementById("statusBar");
    bar.className = "status-bar loading";
    bar.innerHTML = '<span class="pulse"></span>加载中...';

    // 收集所有股票代码
    const allCodes = [];
    SECTORS.forEach(s => allCodes.push(...s.stocks));
    const uniqueCodes = [...new Set(allCodes)];

    try {
        const data = await fetchQuotes(uniqueCodes);
        const grid = document.getElementById("heatmap");

        const sectorData = SECTORS.map(sector => {
            const pcts = sector.stocks.map(code => {
                const prefix = /^6[0-9]\d{4}$/.test(code) ? "sh" : "sz";
                const q = data[prefix + code];
                return q ? q.changePct : 0;
            }).filter(p => p !== 0);
            const avgPct = pcts.length > 0 ? pcts.reduce((a, b) => a + b, 0) / pcts.length : 0;
            return { name: sector.name, pct: avgPct, count: sector.stocks.length };
        });

        // 按涨跌幅排序
        sectorData.sort((a, b) => b.pct - a.pct);

        grid.innerHTML = sectorData.map(s => {
            const color = getHeatColor(s.pct);
            const cls = s.pct >= 0 ? "up" : "down";
            return '<div class="heat-cell" style="background:' + color + '">' +
                '<div class="sector-name">' + s.name + '</div>' +
                '<div class="pct ' + cls + '">' + (s.pct>=0?"+":"") + s.pct.toFixed(2) + '%</div>' +
                '<div class="stocks">' + s.count + '只</div>' +
            '</div>';
        }).join("");

        bar.className = "status-bar";
        bar.innerHTML = '<span class="pulse"></span>更新于 ' + new Date().toLocaleTimeString("zh-CN");
    } catch(e) {
        bar.className = "status-bar";
        bar.innerHTML = "加载失败: " + e.message;
    }
}

document.getElementById("refreshBtn").onclick = () => {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    refreshHeatmap().finally(() => btn.classList.remove("spinning"));
};

refreshHeatmap();
setInterval(refreshHeatmap, 60000);
</script>
</body>
</html>
