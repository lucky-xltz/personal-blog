<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>技术分析 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#1f1a16;--bg-raised:#2a231c;--shadow-dark:rgba(0,0,0,.55);--shadow-light:rgba(255,255,255,.04);--accent:#e67e22;--text:#e0e5ec;--text-dim:#a0a8b8;--text-muted:#7a8494;--border:rgba(255,255,255,.06);--up:#f85149;--down:#2ea043;--warn:#d29922;--radius-md:18px;--radius-sm:12px;--neu-raised:6px 6px 14px var(--shadow-dark),-6px -6px 14px var(--shadow-light);--neu-raised-sm:3px 3px 8px var(--shadow-dark),-3px -3px 8px var(--shadow-light);--neu-inset-sm:inset 2px 2px 5px var(--shadow-dark),inset -2px -2px 5px var(--shadow-light);--transition:.3s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
        body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        .nav{background:rgba(31,26,22,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:700;color:var(--accent);text-decoration:none}
        .nav-links{display:flex;gap:24px;list-style:none}
        .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem;transition:color var(--transition)}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .container{max-width:640px;margin:0 auto;padding:24px 16px}
        .page-title{text-align:center;margin-bottom:24px}
        .page-title h1{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-title p{color:var(--text-dim);font-size:.85rem;margin-top:8px}
        .up{color:var(--up)}.down{color:var(--down)}
        .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
        .toolbar input{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;flex:1}
        .toolbar input:focus{border-color:var(--accent)}
        .btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition);box-shadow:var(--neu-raised-sm)}
        .btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
        .stock-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:16px;background:var(--bg-raised);border-radius:var(--radius-md);box-shadow:var(--neu-raised);border:1px solid var(--border)}
        .stock-info .name{font-size:18px;font-weight:600}
        .stock-info .price{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
        .indicator-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
        .ind-card{background:var(--bg-raised);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--neu-raised);border:1px solid var(--border)}
        .ind-card .label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
        .ind-card .value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
        .ind-card .signal{font-size:11px;margin-top:6px;padding:3px 8px;border-radius:6px;display:inline-block}
        .ind-card .signal.buy{background:rgba(46,160,67,.15);color:var(--down)}
        .ind-card .signal.sell{background:rgba(248,81,73,.15);color:var(--up)}
        .ind-card .signal.neutral{background:rgba(210,153,34,.15);color:var(--warn)}
        .chart-area{background:var(--bg-raised);border-radius:var(--radius-md);padding:20px;box-shadow:var(--neu-raised);border:1px solid var(--border);margin-bottom:16px}
        .chart-area canvas{width:100%!important}
        .chart-title{font-size:13px;color:var(--text-dim);margin-bottom:12px}
        .status-bar{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
        .status-bar.loading{color:var(--accent)}
        .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:6px;vertical-align:middle;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .footer{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:.8rem}
        .footer a{color:var(--accent);text-decoration:none}
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--bg-raised);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:10000;opacity:0;transition:all .3s;pointer-events:none;max-width:90vw;text-align:center}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">林小白</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="stock-tools.html" class="active">股票工具</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">
        <h1>技术分析</h1>
        <p>MACD/KDJ/RSI技术指标计算与信号判断</p>
    </div>

    <div class="toolbar">
        <input id="stockInput" placeholder="输入股票代码，如 601991" value="601991" />
        <button class="btn" id="queryBtn">分析</button>
    </div>

    <div id="stockInfo" class="stock-info" style="display:none"></div>
    <div class="indicator-cards" id="indicatorCards"></div>

    <div class="chart-area">
        <div class="chart-title">MACD (12,26,9)</div>
        <canvas id="macdChart" height="120"></canvas>
    </div>
    <div class="chart-area">
        <div class="chart-title">KDJ (9,3,3)</div>
        <canvas id="kdjChart" height="120"></canvas>
    </div>
    <div class="chart-area">
        <div class="chart-title">RSI (6,12,24)</div>
        <canvas id="rsiChart" height="120"></canvas>
    </div>

    <div class="status-bar" id="statusBar">输入股票代码开始分析</div>
</div>

<footer class="footer">
    <p>数据来源：腾讯财经 · 仅供学习参考</p>
    <p style="margin-top:8px"><a href="stock-tools.html">← 返回工具箱</a></p>
</footer>

<div class="toast" id="toast"></div>

<script>
const CORS_PROXY = "https://api.codetabs.com/v1/proxy/?quest=";

function showToast(msg, type) {
  type = type || 'info';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

function sinaCode(code) {
  if (/^(sh|sz|bj)\d{6}$/.test(code)) return code;
  if (/^(60|68|9)\d{5}$/.test(code)) return "sh" + code;
  if (/^(00|30)\d{5}$/.test(code)) return "sz" + code;
  return "sh" + code;
}

function fetchKLine(code, count) {
  count = count || 120;
  return new Promise((resolve, reject) => {
    const sc = sinaCode(code);
    const url = CORS_PROXY + encodeURIComponent("https://web.ifzq.gtimg.cn/appstock/app/kline/kline?param=" + sc + ",day,,," + count);
    const timeout = setTimeout(() => reject(new Error("超时")), 15000);
    fetch(url, { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        clearTimeout(timeout);
        const list = data && data.data && data.data[sc] && data.data[sc].day;
        if (!list) return reject(new Error("无数据"));
        resolve(list.map(r => ({ date: r[0], close: parseFloat(r[2]) })));
      })
      .catch(e => { clearTimeout(timeout); reject(e); });
  });
}

function fetchQuote(code) {
  return new Promise((resolve, reject) => {
    const sc = sinaCode(code);
    const url = CORS_PROXY + encodeURIComponent("https://qt.gtimg.cn/q=" + sc);
    const timeout = setTimeout(() => reject(new Error("超时")), 15000);
    fetch(url, { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => {
        clearTimeout(timeout);
        const raw = new TextDecoder('gbk').decode(buf);
        const m = raw.match(/="([^"]+)"/);
        if (!m) return reject(new Error("无数据"));
        const f = m[1].split("~");
        resolve({ name: f[1]||"", price: parseFloat(f[3])||0, changePct: parseFloat(f[32])||0 });
      })
      .catch(e => { clearTimeout(timeout); reject(e); });
  });
}

function fmtPct(p) { return (p>=0?"+":"") + (p*100).toFixed(2) + "%"; }

// 技术指标计算
function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const ema = [data[0]];
  for (let i = 1; i < data.length; i++) ema.push(data[i] * k + ema[i-1] * (1 - k));
  return ema;
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const dif = ema12.map((v, i) => v - ema26[i]);
  const dea = calcEMA(dif, 9);
  const macd = dif.map((v, i) => (v - dea[i]) * 2);
  return { dif, dea, macd };
}

function calcKDJ(closes, highs, lows, period) {
  period = period || 9;
  const k = [], d = [], j = [];
  let prevK = 50, prevD = 50;
  for (let i = 0; i < closes.length; i++) {
    const start = Math.max(0, i - period + 1);
    const sliceH = highs.slice(start, i + 1);
    const sliceL = lows.slice(start, i + 1);
    const hn = Math.max(...sliceH), ln = Math.min(...sliceL);
    const rsv = hn === ln ? 50 : (closes[i] - ln) / (hn - ln) * 100;
    const curK = 2/3 * prevK + 1/3 * rsv;
    const curD = 2/3 * prevD + 1/3 * curK;
    const curJ = 3 * curK - 2 * curD;
    k.push(curK); d.push(curD); j.push(curJ);
    prevK = curK; prevD = curD;
  }
  return { k, d, j };
}

function calcRSI(closes, period) {
  const rsi = [50];
  for (let i = 1; i < closes.length; i++) {
    const change = closes[i] - closes[i-1];
    let avgGain = 0, avgLoss = 0;
    for (let j = Math.max(0, i - period + 1); j <= i; j++) {
      const c = j > 0 ? closes[j] - closes[j-1] : 0;
      if (c > 0) avgGain += c; else avgLoss -= c;
    }
    avgGain /= period; avgLoss /= period;
    const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
    rsi.push(100 - 100 / (1 + rs));
  }
  return rsi;
}

function drawLineChart(canvas, datasets, opts) {
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width - 40;
  const h = opts.height || 120;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  // 计算范围
  let allVals = [];
  datasets.forEach(d => allVals.push(...d.data));
  let min = Math.min(...allVals), max = Math.max(...allVals);
  if (opts.min !== undefined) min = opts.min;
  if (opts.max !== undefined) max = opts.max;
  const range = max - min || 1;

  // 参考线
  if (opts.refLines) {
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    opts.refLines.forEach(v => {
      const y = h - ((v - min) / range) * (h - 10) - 5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // 画线
  const colors = opts.colors || ["#e67e22","#3498db","#2ecc71"];
  datasets.forEach((d, idx) => {
    ctx.strokeStyle = colors[idx % colors.length];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    d.data.forEach((v, i) => {
      const x = (i / (d.data.length - 1)) * w;
      const y = h - ((v - min) / range) * (h - 10) - 5;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // MACD柱状图
  if (opts.bars) {
    const barW = Math.max(1, w / opts.bars.length - 1);
    opts.bars.forEach((v, i) => {
      const x = (i / (opts.bars.length - 1)) * w - barW / 2;
      const zeroY = h - ((0 - min) / range) * (h - 10) - 5;
      const valY = h - ((v - min) / range) * (h - 10) - 5;
      ctx.fillStyle = v >= 0 ? "rgba(248,81,73,0.6)" : "rgba(46,160,67,0.6)";
      ctx.fillRect(x, Math.min(zeroY, valY), barW, Math.abs(valY - zeroY));
    });
  }
}

async function analyze() {
  const code = document.getElementById("stockInput").value.trim();
  if (!/^\d{6}$/.test(code)) { showToast("请输入6位代码", "error"); return; }

  const bar = document.getElementById("statusBar");
  bar.className = "status-bar loading";
  bar.innerHTML = '<span class="pulse"></span>计算中...';

  try {
    const [klines, quote] = await Promise.all([
      fetchKLine(code, 120),
      fetchQuote(code).catch(() => null)
    ]);

    const closes = klines.map(k => k.close);
    const highs = klines.map(k => k.high || k.close * 1.02);
    const lows = klines.map(k => k.low || k.close * 0.98);

    // 计算指标
    const macd = calcMACD(closes);
    const kdj = calcKDJ(closes, highs, lows, 9);
    const rsi6 = calcRSI(closes, 6);
    const rsi12 = calcRSI(closes, 12);

    // 股票信息
    const infoDiv = document.getElementById("stockInfo");
    if (quote) {
      const cls = quote.changePct >= 0 ? "up" : "down";
      infoDiv.style.display = "flex";
      infoDiv.innerHTML = '<div><div class="name">' + quote.name + ' <span style="color:var(--text-muted);font-size:13px">' + code + '</span></div></div>' +
        '<div style="text-align:right"><div class="price ' + cls + '">' + quote.price.toFixed(2) + '</div><div class="' + cls + '">' + fmtPct(quote.changePct/100) + '</div></div>';
    }

    // 信号判断
    const lastDIF = macd.dif[macd.dif.length-1];
    const lastDEA = macd.dea[macd.dea.length-1];
    const prevDIF = macd.dif[macd.dif.length-2];
    const prevDEA = macd.dea[macd.dea.length-2];
    const macdSignal = (prevDIF <= prevDEA && lastDIF > lastDEA) ? "buy" : (prevDIF >= prevDEA && lastDIF < lastDEA) ? "sell" : "neutral";
    const macdText = macdSignal === "buy" ? "金叉买入" : macdSignal === "sell" ? "死叉卖出" : lastDIF > lastDEA ? "多头" : "空头";

    const lastK = kdj.k[kdj.k.length-1], lastD = kdj.d[kdj.d.length-1], lastJ = kdj.j[kdj.j.length-1];
    const kdjSignal = lastK < 20 && lastD < 20 ? "buy" : lastK > 80 && lastD > 80 ? "sell" : "neutral";
    const kdjText = kdjSignal === "buy" ? "超卖区" : kdjSignal === "sell" ? "超买区" : "中性";

    const lastRSI = rsi6[rsi6.length-1];
    const rsiSignal = lastRSI < 30 ? "buy" : lastRSI > 70 ? "sell" : "neutral";
    const rsiText = rsiSignal === "buy" ? "超卖" : rsiSignal === "sell" ? "超买" : "中性";

    document.getElementById("indicatorCards").innerHTML =
      '<div class="ind-card"><div class="label">MACD (DIF/DEA)</div><div class="value">' + lastDIF.toFixed(3) + ' / ' + lastDEA.toFixed(3) + '</div><span class="signal ' + macdSignal + '">' + macdText + '</span></div>' +
      '<div class="ind-card"><div class="label">KDJ (K/D/J)</div><div class="value">' + lastK.toFixed(1) + ' / ' + lastD.toFixed(1) + ' / ' + lastJ.toFixed(1) + '</div><span class="signal ' + kdjSignal + '">' + kdjText + '</span></div>' +
      '<div class="ind-card"><div class="label">RSI6</div><div class="value">' + lastRSI.toFixed(2) + '</div><span class="signal ' + rsiSignal + '">' + rsiText + '</span></div>' +
      '<div class="ind-card"><div class="label">RSI12</div><div class="value">' + rsi12[rsi12.length-1].toFixed(2) + '</div><span class="signal ' + rsiSignal + '">' + rsiText + '</span></div>';

    // 画图
    const showN = 60;
    drawLineChart(document.getElementById("macdChart"), [
      { name: "DIF", data: macd.dif.slice(-showN) },
      { name: "DEA", data: macd.dea.slice(-showN) }
    ], { bars: macd.macd.slice(-showN), colors: ["#e67e22","#3498db"], height: 120 });

    drawLineChart(document.getElementById("kdjChart"), [
      { name: "K", data: kdj.k.slice(-showN) },
      { name: "D", data: kdj.d.slice(-showN) },
      { name: "J", data: kdj.j.slice(-showN) }
    ], { refLines: [20, 50, 80], min: 0, max: 100, colors: ["#e67e22","#3498db","#2ecc71"], height: 120 });

    drawLineChart(document.getElementById("rsiChart"), [
      { name: "RSI6", data: rsi6.slice(-showN) },
      { name: "RSI12", data: rsi12.slice(-showN) }
    ], { refLines: [30, 50, 70], min: 0, max: 100, colors: ["#e67e22","#3498db"], height: 120 });

    bar.className = "status-bar";
    bar.innerHTML = "分析完成 · " + new Date().toLocaleTimeString("zh-CN");
  } catch(e) {
    bar.className = "status-bar";
    bar.innerHTML = "分析失败: " + e.message;
  }
}

document.getElementById("queryBtn").onclick = analyze;
document.getElementById("stockInput").onkeydown = e => { if (e.key === "Enter") analyze(); };
</script>
</body>
</html>
