<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>新股日历 | 林小白的数字花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#1f1a16;--bg-raised:#2a231c;--shadow-dark:rgba(0,0,0,.55);--shadow-light:rgba(255,255,255,.04);--accent:#e67e22;--text:#e0e5ec;--text-dim:#a0a8b8;--text-muted:#7a8494;--border:rgba(255,255,255,.06);--up:#f85149;--down:#2ea043;--warn:#d29922;--radius-md:18px;--radius-sm:12px;--neu-raised:6px 6px 14px var(--shadow-dark),-6px -6px 14px var(--shadow-light);--neu-raised-sm:3px 3px 8px var(--shadow-dark),-3px -3px 8px var(--shadow-light);--neu-inset-sm:inset 2px 2px 5px var(--shadow-dark),inset -2px -2px 5px var(--shadow-light);--transition:.3s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Inter',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
        body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        .nav{background:rgba(31,26,22,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-logo{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:700;color:var(--accent);text-decoration:none}
        .nav-links{display:flex;gap:24px;list-style:none}
        .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem;transition:color var(--transition)}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .container{max-width:640px;margin:0 auto;padding:24px 16px}
        .page-title{text-align:center;margin-bottom:24px}
        .page-title h1{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .page-title p{color:var(--text-dim);font-size:.85rem;margin-top:8px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:24px}
        .cal-header{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0;font-weight:500}
        .cal-day{background:var(--bg-raised);border-radius:8px;padding:8px;min-height:60px;font-size:12px;border:1px solid var(--border);transition:all var(--transition)}
        .cal-day:hover{border-color:var(--accent)}
        .cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
        .cal-day .num{font-weight:600;margin-bottom:4px}
        .cal-day .event{font-size:10px;color:var(--accent);margin-top:2px;padding:2px 4px;background:rgba(230,126,34,.1);border-radius:4px}
        .cal-day.other-month{opacity:.3}
        .ipo-list{margin-top:16px}
        .ipo-card{background:var(--bg-raised);border-radius:var(--radius-md);padding:16px;box-shadow:var(--neu-raised);border:1px solid var(--border);margin-bottom:12px}
        .ipo-card .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
        .ipo-card .name{font-size:16px;font-weight:600}
        .ipo-card .code{font-size:12px;color:var(--text-muted);margin-top:2px}
        .ipo-card .date{font-size:12px;color:var(--accent);background:rgba(230,126,34,.1);padding:4px 8px;border-radius:6px}
        .ipo-card .details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .ipo-card .detail-label{font-size:11px;color:var(--text-muted)}
        .ipo-card .detail-value{font-size:13px;font-weight:500;margin-top:2px}
        .status-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500}
        .status-tag.upcoming{background:rgba(230,126,34,.15);color:var(--accent)}
        .status-tag.today{background:rgba(46,160,67,.15);color:var(--down)}
        .status-tag.done{background:rgba(122,132,148,.15);color:var(--text-muted)}
        .section-title{font-size:14px;color:var(--text-dim);font-weight:500;margin-bottom:12px;padding:0 4px}
        .footer{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:.8rem}
        .footer a{color:var(--accent);text-decoration:none}
        .notice{background:rgba(210,153,34,.08);border-left:3px solid var(--warn);padding:12px 16px;border-radius:0 10px 10px 0;margin-bottom:16px;font-size:12px;color:var(--text-dim);line-height:1.7}
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">林小白</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="stock-tools.html" class="active">股票工具</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">
        <h1>新股日历</h1>
        <p>IPO申购日历 · 新股上市时间表</p>
    </div>

    <div class="notice">
        数据为模拟示例，实际IPO信息请参考交易所官方公告。
    </div>

    <div class="section-title">2026年6月</div>
    <div class="calendar-grid" id="calendar"></div>

    <div class="section-title">近期新股</div>
    <div class="ipo-list" id="ipoList"></div>
</div>

<footer class="footer">
    <p>数据来源：交易所公告 · 仅供学习参考</p>
    <p style="margin-top:8px"><a href="stock-tools.html">← 返回工具箱</a></p>
</footer>

<script>
// 模拟IPO数据
const IPO_DATA = [
    { name: "智芯科技", code: "688888", date: "2026-06-05", price: 32.50, pe: 28.5, market: "科创板", status: "upcoming" },
    { name: "新能源材料", code: "301999", date: "2026-06-06", price: 18.80, pe: 22.3, market: "创业板", status: "upcoming" },
    { name: "云数据服务", code: "605888", date: "2026-06-08", price: 45.20, pe: 35.1, market: "沪市主板", status: "upcoming" },
    { name: "智能装备", code: "001888", date: "2026-06-10", price: 26.60, pe: 19.8, market: "深市主板", status: "upcoming" },
    { name: "生物制药", code: "301888", date: "2026-06-12", price: 58.00, pe: 42.6, market: "创业板", status: "upcoming" },
    { name: "半导体材料", code: "688777", date: "2026-06-15", price: 88.80, pe: 55.2, market: "科创板", status: "upcoming" },
];

function renderCalendar() {
    const grid = document.getElementById("calendar");
    const headers = ["一","二","三","四","五","六","日"];
    let html = headers.map(h => '<div class="cal-header">' + h + '</div>').join("");

    const today = new Date();
    const year = 2026, month = 5; // June (0-indexed)
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startWeekday = (firstDay.getDay() + 6) % 7; // Monday=0

    // Previous month days
    const prevLast = new Date(year, month, 0);
    for (let i = startWeekday - 1; i >= 0; i--) {
        html += '<div class="cal-day other-month"><div class="num">' + (prevLast.getDate() - i) + '</div></div>';
    }

    // Current month
    const ipoDates = {};
    IPO_DATA.forEach(ipo => {
        const d = new Date(ipo.date);
        if (d.getMonth() === month) ipoDates[d.getDate()] = ipo.name;
    });

    for (let d = 1; d <= lastDay.getDate(); d++) {
        const isToday = d === today.getDate() && month === today.getMonth();
        const event = ipoDates[d] ? '<div class="event">' + ipoDates[d] + '</div>' : "";
        html += '<div class="cal-day' + (isToday ? ' today' : '') + '"><div class="num">' + d + '</div>' + event + '</div>';
    }

    // Next month days
    const remaining = 42 - (startWeekday + lastDay.getDate());
    for (let i = 1; i <= remaining; i++) {
        html += '<div class="cal-day other-month"><div class="num">' + i + '</div></div>';
    }

    grid.innerHTML = html;
}

function renderIPOList() {
    const list = document.getElementById("ipoList");
    const today = new Date().toISOString().slice(0, 10);

    list.innerHTML = IPO_DATA.map(ipo => {
        const statusCls = ipo.date === today ? "today" : ipo.date > today ? "upcoming" : "done";
        const statusText = ipo.date === today ? "今日申购" : ipo.date > today ? "待申购" : "已完成";
        return '<div class="ipo-card">' +
            '<div class="header"><div><div class="name">' + ipo.name + '</div><div class="code">' + ipo.code + ' · ' + ipo.market + '</div></div>' +
            '<div><div class="date">' + ipo.date + '</div><div style="margin-top:4px"><span class="status-tag ' + statusCls + '">' + statusText + '</span></div></div></div>' +
            '<div class="details">' +
                '<div><div class="detail-label">发行价</div><div class="detail-value">' + ipo.price.toFixed(2) + '元</div></div>' +
                '<div><div class="detail-label">市盈率</div><div class="detail-value">' + ipo.pe.toFixed(1) + '倍</div></div>' +
                '<div><div class="detail-label">板块</div><div class="detail-value">' + ipo.market + '</div></div>' +
            '</div></div>';
    }).join("");
}

renderCalendar();
renderIPOList();
</script>
</body>
</html>
